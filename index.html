<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - FORCE START</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: radial-gradient(circle, #300, #000); border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 300px; }
        
        /* Menu setup */
        #menu, #gameOver { 
            text-align: center; position: absolute; z-index: 999; width: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; height: 100vh; top: 0; left: 0;
        }
        #gameOver { display: none; background: rgba(0,0,0,0.9); }
        
        h1 { font-size: 45px; color: var(--p); text-shadow: 0 0 15px var(--p); margin: 0 0 20px 0; }
        .btn { 
            background: var(--p); color: #fff; border: none; padding: 18px 40px; 
            font-size: 22px; font-weight: bold; border-radius: 12px; margin-top: 15px; 
            min-width: 220px; box-shadow: 0 0 20px var(--p); cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        #jumpBtn { 
            position: fixed; bottom: 30px; right: 30px; width: 90px; height: 90px; 
            background: rgba(255,0,0,0.2); border: 4px solid var(--p); border-radius: 50%; 
            color: var(--p); display: none; z-index: 1000; font-weight: bold;
        }
        #ui { position: fixed; top: 20px; left: 20px; color: var(--p); font-size: 24px; font-weight: bold; display: none; }
        
        .modBox { margin-top: 15px; border: 2px solid var(--p); padding: 10px; border-radius: 10px; display: none; width: 200px; }
        .modOpt { background: #222; color: #fff; border: 1px solid #444; padding: 10px; width: 100%; margin-bottom: 5px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <button id="startBtn" class="btn">START GAME</button>
        <button id="modBtn" class="btn" style="font-size:16px; min-width:140px;">MODS</button>
        <div id="mMod" class="modBox">
            <button class="modOpt" id="redM">RED</button>
            <button class="modOpt" id="blueM">BLUE</button>
            <button class="modOpt" id="greenM">GREEN</button>
        </div>
    </div>

    <div id="gameOver">
        <h1>WASTED</h1>
        <p id="fS" style="color:#fff; font-size:24px;">SCORE: 0</p>
        <button id="restartBtn" class="btn">RESTART</button>
    </div>

    <div id="ui">SCORE: <span id="s">0</span></div>
    <canvas id="game"></canvas>
    <button id="jumpBtn">JUMP</button>

    <script>
        const cvs=document.getElementById('game'), ctx=cvs.getContext('2d'), 
              mnu=document.getElementById('menu'), gov=document.getElementById('gameOver'), 
              jb=document.getElementById('jumpBtn'), u=document.getElementById('ui');

        cvs.width=window.innerWidth; cvs.height=300;
        let p, obs, sc, spd, act=false, clr='#f00', req;

        // Force Event Listeners (Onclick-nu pakaram)
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('modBtn').addEventListener('click', () => {
            let m = document.getElementById('mMod');
            m.style.display = (m.style.display == 'block') ? 'none' : 'block';
        });

        // Color Mods
        document.getElementById('redM').addEventListener('click', () => setC('#f00','#300'));
        document.getElementById('blueM').addEventListener('click', () => setC('#00f','#003'));
        document.getElementById('greenM').addEventListener('click', () => setC('#0f0','#030'));

        jb.addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); });
        jb.addEventListener('mousedown', doJump);

        function startGame(){
            act=true;
            mnu.style.display='none'; gov.style.display='none'; 
            cvs.style.display='block'; jb.style.display='block'; u.style.display='block';
            
            p={x:50, y:200, w:40, h:40, dy:0, g:0.8, jmp:14, onG:false};
            obs=[]; sc=0; spd=6;
            document.getElementById('s').innerText=0;
            loop();
        }

        function doJump(){ if(p.onG){ p.dy=-p.jmp; p.onG=false; } }

        function loop(){
            if(!act) return;
            ctx.clearRect(0,0,cvs.width,cvs.height);
            
            p.dy+=p.g; p.y+=p.dy;
            if(p.y+p.h>=300){ p.y=300-p.h; p.dy=0; p.onG=true; }
            
            ctx.fillStyle=clr; ctx.shadowBlur=15; ctx.shadowColor=clr;
            ctx.fillRect(p.x, p.y, p.w, p.h);

            if(Math.random()<0.02 && (obs.length==0 || obs[obs.length-1].x < cvs.width-250)){
                obs.push({x:cvs.width, y:260, w:30, h:40});
            }

            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd;
                ctx.shadowBlur=0; ctx.fillStyle='#fff';
                ctx.fillRect(obs[i].x, obs[i].y, obs[i].w, obs[i].h);
                
                if(p.x < obs[i].x+obs[i].w && p.x+p.w > obs[i].x && p.y+p.h > obs[i].y) endGame();
                
                if(obs[i].x < -50){ 
                    obs.splice(i,1); sc++; 
                    document.getElementById('s').innerText=sc; 
                    spd+=0.1; 
                }
            }
            req = requestAnimationFrame(loop);
        }

        function endGame(){
            act=false; cancelAnimationFrame(req);
            cvs.style.display='none'; jb.style.display='none'; u.style.display='none';
            gov.style.display='flex'; document.getElementById('fS').innerText='SCORE: '+sc;
        }

        function setC(c, b){
            clr=c; document.documentElement.style.setProperty('--p', c);
            cvs.style.background=`radial-gradient(circle, ${b}, #000)`;
        }
    </script>
</body>
</html>
