<!DOCTYPE html>
<html>
<head>

    <title>DEVIL DASH - FIXED</title>
    <style>
        :root { --p: #f00; --bg: radial-gradient(circle, #300, #000); }

        canvas { background: var(--bg); border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 300px; }
        
        /* Menu & GameOver fixed center */
        #menu, #gameOver { 
            text-align: center; 
            position: absolute; 
            z-index: 50; 
            width: 100%; 
            display: flex; /* ഇത് എപ്പോഴും കാണാൻ സഹായിക്കും */
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0,0,0,0.9);
            height: 100vh;
            top: 0;
            left: 0;
        }
        #gameOver { display: none; }
        
        h1 { font-size: 45px; color: var(--p); text-shadow: 0 0 15px var(--p); margin-bottom: 20px; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px 35px; font-size: 20px; font-weight: bold; border-radius: 10px; margin-top: 15px; min-width: 200px; box-shadow: 0 0 15px var(--p); cursor: pointer; }
        
        #jumpBtn { position: fixed; bottom: 30px; right: 30px; width: 90px; height: 90px; background: rgba(255,0,0,0.1); border: 4px solid var(--p); border-radius: 50%; color: var(--p); display: none; z-index: 100; font-weight: bold; outline: none; }
        #ui { position: fixed; top: 20px; left: 20px; color: var(--p); font-size: 22px; font-weight: bold; display: none; z-index: 10; }
        
        .modBox { margin-top: 10px; border: 2px solid var(--p); padding: 10px; border-radius: 12px; background: #111; width: 200px; display: none; }
        .modOpt { background: transparent; color: #fff; border: 1px solid #fff; padding: 10px; width: 100%; margin-bottom: 8px; border-radius: 5px; font-size: 14px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
