<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - FIXED VIEW</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* കാൻവാസ് ഡിസ്‌പ്ലേ ശരിയാക്കി */
        canvas { background: radial-gradient(circle, #200, #000); border-bottom: 4px solid var(--p); display: none; width: 100vw; height: 350px; }
        
        #menu, #gameOver { 
            text-align: center; position: absolute; z-index: 999; width: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; height: 100vh; top: 0; left: 0;
        }
        #gameOver { display: none; background: rgba(0,0,0,0.9); }
        
        h1 { font-size: 45px; color: var(--p); text-shadow: 0 0 15px var(--p); margin: 0 0 20px 0; }
        .btn { 
            background: var(--p); color: #fff; border: none; padding: 15px 40px; 
            font-size: 20px; font-weight: bold; border-radius: 12px; margin-top: 15px; 
            min-width: 220px; box-shadow: 0 0 20px var(--p); cursor: pointer;
        }
        
        #jumpBtn { 
            position: fixed; bottom: 30px; right: 30px; width: 90px; height: 90px; 
            background: rgba(255,0,0,0.1); border: 4px solid var(--p); border-radius: 50%; 
            color: var(--p); display: none; z-index: 1000; font-weight: bold;
        }
        #ui { position: fixed; top: 20px; left: 20px; color: var(--p); font-size: 24px; font-weight: bold; display: none; z-index: 10; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <button id="sBtn" class="btn">START GAME</button>
    </div>

    <div id="gameOver">
        <h1>WASTED</h1>
        <p id="fS" style="color:#fff; font-size:24px;">SCORE: 0</p>
        <button id="rBtn" class="btn">RESTART</button>
    </div>

    <div id="ui">SCORE: <span id="s">0</span></div>
    <canvas id="game"></canvas>
    <button id="jumpBtn">JUMP</button>

    <script>
        const cvs=document.getElementById('game'), ctx=cvs.getContext('2d'), 
              mnu=document.getElementById('menu'), gov=document.getElementById('gameOver'), 
              jb=document.getElementById('jumpBtn'), u=document.getElementById('ui');

        cvs.width=window.innerWidth; cvs.height=350; // ഹൈറ്റ് അല്പം കൂട്ടി
        let p, obs, sc, spd, act=false, clr='#f00', req;

        document.getElementById('sBtn').addEventListener('click', startGame);
        document.getElementById('rBtn').addEventListener('click', startGame);
        jb.addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); });
        jb.addEventListener('mousedown', doJump);

        function startGame(){
            act=true; mnu.style.display='none'; gov.style.display='none'; 
            cvs.style.display='block'; jb.style.display='block'; u.style.display='block';
            
            // പ്ലെയർ ഹൈറ്റ് 350-ലേക്ക് അഡ്ജസ്റ്റ് ചെയ്തു
            p={x:60, y:250, w:45, h:45, dy:0, g:0.8, jmp:15, onG:false};
            obs=[]; sc=0; spd=7;
            document.getElementById('s').innerText=0;
            loop();
        }

        function doJump(){ if(p.onG){ p.dy=-p.jmp; p.onG=false; } }

        function loop(){
            if(!act) return;
            ctx.clearRect(0,0,cvs.width,cvs.height);
            
            p.dy+=p.g; p.y+=p.dy;
            if(p.y+p.h>=350){ p.y=350-p.h; p.dy=0; p.onG=true; }
            
            // Player - Devil
            ctx.fillStyle='#111'; ctx.shadowBlur=15; ctx.shadowColor=clr;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle=clr; // Eyes
            ctx.beginPath(); ctx.arc(p.x+12, p.y+15, 4, 0, Math.PI*2); ctx.arc(p.x+33, p.y+15, 4, 0, Math.PI*2); ctx.fill();

            // Obstacles
            if(Math.random()<0.02 && (obs.length==0 || obs[obs.length-1].x < cvs.width-280)){
                obs.push({x:cvs.width, y:350, w:35, h:45});
            }

            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd;
                ctx.shadowBlur=0; ctx.fillStyle='#fff';
                ctx.beginPath();
                ctx.moveTo(obs[i].x, 350);
                ctx.lineTo(obs[i].x+17, 350-obs[i].h);
                ctx.lineTo(obs[i].x+35, 350);
                ctx.fill();
                
                if(p.x < obs[i].x+28 && p.x+p.w > obs[i].x+7 && p.y+p.h > 350-obs[i].h) endGame();
                if(obs[i].x < -60){ obs.splice(i,1); sc++; document.getElementById('s').innerText=sc; spd+=0.1; }
            }
            req = requestAnimationFrame(loop);
        }

        function endGame(){
            act=false; cancelAnimationFrame(req);
            cvs.style.display='none'; jb.style.display='none'; u.style.display='none';
            gov.style.display='flex'; document.getElementById('fS').innerText='SCORE: '+sc;
        }
    </script>
</body>
</html>
