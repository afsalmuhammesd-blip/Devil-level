<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - MOD & TASKS</title>
    <style>
        :root { --p: #f00; --bg: radial-gradient(circle, #300, #000); }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; color: var(--p); }
        canvas { background: var(--bg); border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 400px; }
        #menu, #gameOver { text-align: center; position: absolute; z-index: 10; width: 100%; display: flex; flex-direction: column; align-items: center; }
        #gameOver { display: none; }
        h1 { font-size: 45px; color: var(--p); text-shadow: 0 0 10px var(--p); margin: 0; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px 35px; font-size: 20px; font-weight: bold; border-radius: 10px; margin-top: 15px; min-width: 200px; box-shadow: 0 0 10px var(--p); transition: 0.2s; }
        #jumpBtn { position: absolute; bottom: 20px; right: 20px; width: 85px; height: 85px; background: rgba(0,0,0,0.5); border: 3px solid var(--p); border-radius: 50%; color: var(--p); display: none; z-index: 100; font-weight: bold; outline: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: var(--p); font-size: 18px; font-weight: bold; display: none; }
        .modBox { margin-top: 15px; border: 2px solid var(--p); padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.9); width: 220px; display: none; }
        .modOpt { background: transparent; color: #fff; border: 1px solid #fff; padding: 8px; width: 100%; margin-bottom: 5px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
