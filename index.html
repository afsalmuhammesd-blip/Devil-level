<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - CLASSIC STYLE</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; }
        
        /* Game Screen Setup */
        canvas { background: radial-gradient(circle, #200, #000); display: none; width: 100%; height: 100%; }
        
        #menu, #gameOver { 
            text-align: center; position: absolute; z-index: 999; width: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; height: 100%; top: 0; left: 0;
        }
        #gameOver { display: none; background: rgba(0,0,0,0.9); }
        
        h1 { font-size: 50px; color: var(--p); text-shadow: 0 0 20px var(--p); margin: 0 0 20px 0; font-weight: 900; letter-spacing: 3px; }
        .btn { 
            background: var(--p); color: #fff; border: none; padding: 15px 40px; 
            font-size: 22px; font-weight: bold; border-radius: 50px; margin-top: 15px; 
            min-width: 220px; box-shadow: 0 0 20px var(--p); cursor: pointer; transition: 0.2s;
        }
        .btn:active { transform: scale(0.9); }
        
        /* Fixed UI & Jump Button */
        #jumpBtn { 
            position: fixed; bottom: 40px; right: 30px; width: 100px; height: 100px; 
            background: rgba(255,0,0,0.1); border: 4px solid var(--p); border-radius: 50%; 
            color: var(--p); display: none; z-index: 1000; font-weight: bold; font-size: 18px;
            box-shadow: 0 0 15px var(--p); outline: none;
        }
        #ui { position: fixed; top: 40px; left: 20px; color: var(--p); font-size: 28px; font-weight: bold; display: none; z-index: 10; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <button id="sBtn" class="btn">START GAME</button>
    </div>

    <div id="gameOver">
        <h1 style="color:#fff; text-shadow: 0 0 20px #f00;">WASTED</h1>
        <p id="fS" style="color:#fff; font-size:28px; margin: 10px 0;">SCORE: 0</p>
        <button id="rBtn" class="btn">RESTART</button>
    </div>

    <div id="ui">SCORE: <span id="s">0</span></div>
    <canvas id="game"></canvas>
    <button id="jumpBtn">JUMP</button>

    <script>
        const cvs=document.getElementById('game'), ctx=cvs.getContext('2d'), 
              mnu=document.getElementById('menu'), gov=document.getElementById('gameOver'), 
              jb=document.getElementById('jumpBtn'), u=document.getElementById('ui');

        function resize() {
            cvs.width = window.innerWidth;
            cvs.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let p, obs, sc, spd, act=false, clr='#f00', req;
        const groundY = () => cvs.height * 0.8; 

        document.getElementById('sBtn').addEventListener('click', startGame);
        document.getElementById('rBtn').addEventListener('click', startGame);
        jb.addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); });
        jb.addEventListener('mousedown', doJump);

        function startGame(){
            act=true; mnu.style.display='none'; gov.style.display='none'; 
            cvs.style.display='block'; jb.style.display='block'; u.style.display='block';
            
            p={x:60, y:groundY()-60, w:50, h:50, dy:0, g:0.9, jmp:19, onG:false};
            obs=[]; sc=0; spd=8;
            document.getElementById('s').innerText=0;
            loop();
        }

        function doJump(){ if(p.onG){ p.dy=-p.jmp; p.onG=false; } }

        function loop(){
            if(!act) return;
            ctx.clearRect(0,0,cvs.width,cvs.height);
            let floor = groundY();
            
            // Neon Ground Line
            ctx.strokeStyle = clr;
            ctx.lineWidth = 4;
            ctx.shadowBlur = 10;
            ctx.shadowColor = clr;
            ctx.beginPath();
            ctx.moveTo(0, floor);
            ctx.lineTo(cvs.width, floor);
            ctx.stroke();

            p.dy+=p.g; p.y+=p.dy;
            if(p.y+p.h >= floor){ p.y=floor-p.h; p.dy=0; p.onG=true; }
            
            // THE DEVIL PLAYER - PAZHAYAPOLE
            ctx.fillStyle='#000';
            ctx.shadowBlur=20;
            ctx.shadowColor=clr;
            ctx.fillRect(p.x, p.y, p.w, p.h); // Black Body
            
            ctx.fillStyle=clr; // Red Eyes
            ctx.shadowBlur=0;
            ctx.beginPath(); 
            ctx.arc(p.x+15, p.y+18, 5, 0, Math.PI*2); 
            ctx.arc(p.x+35, p.y+18, 5, 0, Math.PI*2); 
            ctx.fill();

            // Obstacles - Spikes
            if(Math.random()<0.02 && (obs.length==0 || obs[obs.length-1].x < cvs.width-300)){
                obs.push({x:cvs.width, y:floor, w:40, h:55});
            }

            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd;
                ctx.fillStyle='#fff';
                ctx.shadowBlur=0;
                ctx.beginPath();
                ctx.moveTo(obs[i].x, floor);
                ctx.lineTo(obs[i].x+20, floor-obs[i].h);
                ctx.lineTo(obs[i].x+40, floor);
                ctx.fill();
                
                // Collision
                if(p.x < obs[i].x+30 && p.x+p.w > obs[i].x+10 && p.y+p.h > floor-obs[i].h) endGame();
                
                if(obs[i].x < -100){ 
                    obs.splice(i,1); sc++; 
                    document.getElementById('s').innerText=sc; 
                    spd+=0.15; 
                }
            }
            req = requestAnimationFrame(loop);
        }

        function endGame(){
            act=false; cancelAnimationFrame(req);
            cvs.style.display='none'; jb.style.display='none'; u.style.display='none';
            gov.style.display='flex'; document.getElementById('fS').innerText='SCORE: '+sc;
        }
    </script>
</body>
</html>
