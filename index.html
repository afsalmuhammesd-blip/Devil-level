<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - FIXED FINAL</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        
        canvas { 
            background: #000;
            border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 320px; 
        }
        
        #menu, #gameOver { text-align: center; position: absolute; z-index: 100; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; height: 100vh; top: 0; }
        #gameOver { display: none; background: rgba(0,0,0,0.9); }
        
        h1 { font-size: 45px; color: var(--p); text-shadow: 0 0 15px var(--p); margin: 0 0 20px 0; font-weight: 900; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 12px; margin-top: 15px; min-width: 200px; box-shadow: 0 0 15px var(--p); cursor: pointer; }
        
        #jumpBtn { 
            position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; 
            background: rgba(255,0,0,0.2); border: 2px solid var(--p); border-radius: 50%; 
            color: var(--p); display: none; z-index: 1000; font-weight: bold; font-size: 12px;
            box-shadow: 0 0 10px var(--p); outline: none; -webkit-tap-highlight-color: transparent;
        }
        
        #ui { position: fixed; top: 25px; left: 20px; color: var(--p); font-size: 22px; font-weight: bold; display: none; z-index: 10; }
