<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - FINAL FIX</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: radial-gradient(circle, #300, #000); border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 300px; }
        
        #menu, #gameOver { text-align: center; position: absolute; z-index: 100; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; height: 100vh; top: 0; }
        #gameOver { display: none; background: rgba(0,0,0,0.9); }
        
        h1 { font-size: 40px; color: var(--p); text-shadow: 0 0 10px var(--p); margin: 0 0 20px 0; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; margin-top: 15px; min-width: 200px; box-shadow: 0 0 10px var(--p); cursor: pointer; }
        
        /* JUMP BUTTON ചെറുതാക്കി സൈഡിലേക്ക് മാറ്റി */
        #jumpBtn { 
            position: fixed; 
            bottom: 30px; 
            right: 20px; 
            width: 70px; 
            height: 70px; 
            background: rgba(255,0,0,0.15); 
            border: 2px solid var(--p); 
            border-radius: 50%; 
            color: var(--p); 
            display: none; 
            z-index: 1000; 
            font-weight: bold; 
            font-size: 14px;
            outline: none;
            box-shadow: 0 0 10px var(--p);
            -webkit-tap-highlight-color: transparent;
        }
        
        #ui { position: fixed; top: 25px; left: 20px; color: var(--p); font-size: 22px; font-weight: bold; display: none; z-index: 10; text-shadow: 0 0 5px #000; }
        .modBox { margin-top: 10px; border: 1px solid var(--p); padding: 10px; border-radius: 10px; display: none; width: 200px; }
        .modOpt { background: #222; color: #fff; border: 1px solid #444; padding: 10px; width: 100%; margin-bottom: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <button class="btn" onclick="start()">START GAME</button>
        <button class="btn" style="font-size:14px; min-width:120px;" onclick="tgl('mMod')">MODS</button>
        <div id="mMod" class="modBox">
            <button class="modOpt" style="color:#f00;" onclick="set('#f00','#300')">RED MODE</button>
            <button class="modOpt" style="color:#00f;" onclick="set('#00f','#003')">BLUE MODE</button>
            <button class="modOpt" style="color:#0f0;" onclick="set('#0f0','#030')">GREEN MODE</button>
        </div>
    </div>

    <div id="gameOver">
        <h1 style="text-shadow: 0 0 15px #f00;">WASTED</h1>
        <p id="fS" style="color:#fff; font-size:24px; margin: 10px 0;">SCORE: 0</p>
        <button class="btn" onclick="start()">RESTART</button>
        <button class="btn" style="font-size:14px; min-width:120px;" onclick="tgl('gMod')">MODS</button>
        <div id="gMod" class="modBox">
            <button class="modOpt" style="color:#f00;" onclick="set('#f00','#300')">RED MODE</button>
            <button class="modOpt" style="color:#00f;" onclick="set('#00f','#003')">BLUE MODE</button>
            <button class="modOpt" style="color:#0f0;" onclick="set('#0f0','#030')">GREEN MODE</button>
        </div>
    </div>

    <div id="ui">SCORE: <span id="s">0</span></div>
    <canvas id="game"></canvas>
    <button id="jumpBtn" ontouchstart="jmp(event)" onmousedown="jmp(event)">JUMP</button>

    <script>
        const cvs=document.getElementById('game'), ctx=cvs.getContext('2d'), m=document.getElementById('menu'), g=document.getElementById('gameOver'), jb=document.getElementById('jumpBtn'), u=document.getElementById('ui');
        cvs.width=window.innerWidth; cvs.height=300;
        let p, obs, sc, spd, run=false, clr='#f00';

        function start(){
            run=true; m.style.display='none'; g.style.display='none'; cvs.style.display='block'; jb.style.display='block'; u.style.display='block';
            p={x:60, y:200, w:45, h:45, dy:0, g:0.8, jump:15, onG:false};
            obs=[]; sc=0; spd=7; document.getElementById('s').innerText=0;
            loop();
        }

        function jmp(e){ if(e) e.preventDefault(); if(p.onG){ p.dy=-p.jump; p.onG=false; } }

        function loop(){
            if(!run) return;
            ctx.clearRect(0,0,cvs.width,cvs.height);
            p.dy+=p.g; p.y+=p.dy;
            if(p.y+p.h>=300){ p.y=300-p.h; p.dy=0; p.onG=true; }
            
            // THE DEVIL PLAYER
            ctx.fillStyle='#000'; ctx.shadowBlur=15; ctx.shadowColor=clr;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle=clr; ctx.shadowBlur=0;
            ctx.beginPath(); ctx.arc(p.x+12, p.y+15, 5, 0, Math.PI*2); ctx.arc(p.x+33, p.y+15, 5, 0, Math.PI*2); ctx.fill();

            // OBSTACLES (Spikes)
            if(Math.random()<0.02 && (obs.length==0 || obs[obs.length-1].x < cvs.width-280)){
                obs.push({x:cvs.width, y:300, w:35, h:45});
            }

            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd;
                ctx.fillStyle='#fff'; ctx.shadowBlur=0;
                ctx.beginPath();
                ctx.moveTo(obs[i].x, 300);
                ctx.lineTo(obs[i].x+17, 300-obs[i].h);
                ctx.lineTo(obs[i].x+35, 300);
                ctx.fill();
                
                if(p.x < obs[i].x+28 && p.x+p.w > obs[i].x+7 && p.y+p.h > 300-obs[i].h) over();
                if(obs[i].x < -60){ obs.splice(i,1); sc++; document.getElementById('s').innerText=sc; spd+=0.12; }
            }
            requestAnimationFrame(loop);
        }

        function over(){ run=false; cvs.style.display='none'; jb.style.display='none'; u.style.display='none'; g.style.display='flex'; document.getElementById('fS').innerText='SCORE: '+sc; }
        function tgl(id){ let e=document.getElementById(id); e.style.display=(e.style.display=='block')?'none':'block'; }
        function set(c, b){ clr=c; document.documentElement.style.setProperty('--p', c); cvs.style.background=`radial-gradient(circle, ${b}, #000)`; }
    </script>
</body>
</html>
