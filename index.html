<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - TOTAL MOD MENU</title>
    <style>
        :root {
            --primary-color: #f00; /* Default Red */
            --bg-glow: radial-gradient(circle, #300, #000);
        }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; color: var(--primary-color); }
        canvas { background: var(--bg-glow); border-bottom: 5px solid var(--primary-color); display: none; width: 100vw; height: 400px; }
        #menu, #gameOver { text-align: center; position: absolute; z-index: 10; width: 100%; }
        #gameOver { display: none; }
        h1 { font-size: 45px; letter-spacing: 8px; margin-bottom: 10px; color: var(--primary-color); text-shadow: 0 0 10px var(--primary-color); }
        h3 { font-size: 20px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .btn { background: var(--primary-color); color: #fff; border: none; padding: 15px 40px; font-size: 22px; font-weight: bold; border-radius: 10px; cursor: pointer; box-shadow: 0 0 15px var(--primary-color); margin-top: 20px; text-transform: uppercase; transition: 0.2s; }
        .btn:active { transform: scale(0.95); box-shadow: 0 0 5px var(--primary-color); }
        
        #jumpBtn { position: absolute; bottom: 20px; right: 20px; width: 85px; height: 85px; background: rgba(0,0,0,0.3); border: 3px solid var(--primary-color); border-radius: 50%; color: var(--primary-color); display: none; z-index: 100; font-weight: bold; font-size: 16px; outline: none; box-shadow: 0 0 10px var(--primary-color); }
        #ui { position: absolute; top: 20px; left: 20px; color: var(--primary-color); font-size: 18px; font-weight: bold; display: none; letter-spacing: 2px; text-shadow: 0 0 5px var(--primary-color); }

        /* MOD MENU STYLES */
        #modMenu { display: none; margin-top: 20px; border: 2px solid var(--primary-color); padding: 15px; border-radius: 15px; background: rgba(0,0,0,0.8); width: 80%; max-width: 300px; margin-left: auto; margin-right: auto; }
        .modOpt { background: transparent; color: #fff; border: 2px solid #fff; padding: 10px; width: 100%; margin-bottom: 10px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; text-transform: uppercase; transition: 0.1s; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <p style="color: #666; margin-bottom: 30px;">TOTAL COLOUR MOD v1</p>
        
        <button class="btn" onclick="initGame()">START GAME</button>
        <br>
        <button id="mainModBtn" class="btn" style="background: var(--primary-color); font-size: 18px; padding: 10px 30px; margin-top: 30px;" onclick="toggleModMenu()">MODS</button>
        
        <div id="modMenu">
            <h3>SELECT COLOUR</h3>
            <button class="modOpt" style="color: #f00; border-color: #f00;" onclick="applyTotalMod('#f00', '#300')">RED (Default)</button>
            <button class="modOpt" style="color: #00f; border-color: #00f;" onclick="applyTotalMod('#00f', '#003')">BLUE</button>
            <button class="modOpt" style="color: #0f0; border-color: #0f0;" onclick="applyTotalMod('#0f0', '#030')">GREEN</button>
            <button class="modOpt" style="color: #f0f; border-color: #f0f;" onclick="applyTotalMod('#f0f', '#303')">VIOLET</button>
            <button class="btn" style="padding: 5px 15px; font-size: 14px; background: #555; box-shadow: none; margin-top: 10px;" onclick="toggleModMenu()">CLOSE</button>
        </div>
    </div>

    <div id="gameOver">
        <h1 style="font-size: 50px;">WASTED</h1>
        <p style="font-size: 25px;">SCORE: <span id="finalScore">0</span></p>
        <button class="btn" onclick="initGame()">RESTART</button>
    </div>

    <div id="ui">SCORE: <span id="s">0</span></div>
    <canvas id="game"></canvas>
    <button id="jumpBtn" onmousedown="jump()" ontouchstart="jump()">JUMP</button>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const gameOver = document.getElementById('gameOver');
        const jumpBtn = document.getElementById('jumpBtn');
        const ui = document.getElementById('ui');
        const modMenu = document.getElementById('modMenu');
        const root = document.documentElement;

        canvas.width = window.innerWidth;
        canvas.height = 400;

        let p, obs, score, speed, active = false, lastSpawn = 0;
        let currentColor = '#f00'; // Stores the selected primary color

        function initGame() {
            active = true;
            menu.style.display = 'none';
            gameOver.style.display = 'none';
            canvas.style.display = 'block';
            jumpBtn.style.display = 'block';
            ui.style.display = 'block';
            modMenu.style.display = 'none'; // Close MOD menu if open

            p = { x: 80, y: 300, w: 40, h: 40, dy: 0, j: 14, g: 0.8, gr: false };
            obs = [];
            score = 0;
            speed = 6.5; 
            lastSpawn = Date.now();
            
            document.getElementById('s').innerText = 0;
            update();
        }

        function jump() {
            if (p.gr) {
                p.dy = -p.j;
                p.gr = false;
            }
        }

        function update() {
            if (!active) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            p.dy += p.g;
            p.y += p.dy;

            if (p.y + p.h >= 400) {
                p.y = 400 - p.h;
                p.dy = 0;
                p.gr = true;
            }

            // Monster Design (Uses currentColor)
            ctx.shadowBlur = 15;
            ctx.shadowColor = currentColor; 
            ctx.fillStyle = '#111'; // Body stays dark
            ctx.fillRect(p.x, p.y, p.w, p.h);
            
            ctx.fillStyle = currentColor; // Eyes match the selected color
            ctx.beginPath();
            ctx.arc(p.x + 10, p.y + 15, 3, 0, Math.PI * 2);
            ctx.arc(p.x + 30, p.y + 15, 3, 0, Math.PI * 2);
            ctx.fill();

            // Obstacle Spawning
            let now = Date.now();
            if (now - lastSpawn > 1400 && Math.random() < 0.05) {
                obs.push({ x: canvas.width, y: 365, w: 32, h: 35 });
                lastSpawn = now;
            }

            for (let i = obs.length - 1; i >= 0; i--) {
                obs[i].x -= speed;
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff'; // Spikes stay white
                ctx.beginPath();
                ctx.moveTo(obs[i].x, 400);
                ctx.lineTo(obs[i].x + obs[i].w / 2, 400 - obs[i].h);
                ctx.lineTo(obs[i].x + obs[i].w, 400);
                ctx.fill();

                if (p.x < obs[i].x + obs[i].w && 
                    p.x + p.w > obs[i].x && 
                    p.y + p.h > 400 - obs[i].h) {
                    endGame();
                }

                if (obs[i].x + obs[i].w < 0) {
                    obs.splice(i, 1);
                    score++;
                    document.getElementById('s').innerText = score;
                    
                    if(score % 5 === 0 && speed < 13) {
                        speed += 0.8;
                    }
                }
            }
            requestAnimationFrame(update);
        }

        function endGame() {
            active = false;
            canvas.style.display = 'none';
            jumpBtn.style.display = 'none';
            ui.style.display = 'none';
            gameOver.style.display = 'block';
            document.getElementById('finalScore').innerText = score;
        }
        
        // MOD MENU FUNCTIONS
        function toggleModMenu() {
            if (modMenu.style.display === 'none' || modMenu.style.display === '') {
                modMenu.style.display = 'block';
            } else {
                modMenu.style.display = 'none';
            }
        }
        
        function applyTotalMod(color, bgGlowColor) {
            currentColor = color;
            // Change CSS variables (Changes ALL Red elements in UI)
            root.style.setProperty('--primary-color', color);
            root.style.setProperty('--bg-glow', `radial-gradient(circle, ${bgGlowColor}, #000)`);
            // modMenu.style.display = 'none'; // Optional: Close menu after selection
        }
    </script>
</body>
</html>
