<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - REPAIRED</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 320px; position: relative; }
        #menu, #gameOver, #lvlMenu { text-align: center; position: absolute; z-index: 100; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; height: 100vh; top: 0; }
        #gameOver, #lvlMenu { display: none; }
        h1 { font-size: 45px; color: var(--p); text-shadow: 0 0 15px var(--p); margin: 0 0 20px 0; font-weight: 900; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 12px; margin-top: 15px; min-width: 200px; cursor: pointer; }
        #jumpBtn { position: fixed; bottom: 30px; right: 25px; width: 80px; height: 80px; background: rgba(255,0,0,0.2); border: 3px solid var(--p); border-radius: 50%; color: #fff; display: none; z-index: 1000; font-weight: bold; outline: none; -webkit-tap-highlight-color: transparent; }
        #ui { position: fixed; top: 25px; left: 20px; color: var(--p); font-size: 20px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <button class="btn" onclick="start(1)">START GAME</button>
        <button class="btn" style="background:#222; border:1px solid var(--p);" onclick="showLvls()">LEVEL SELECT</button>
    </div>

    <div id="lvlMenu">
        <h1>LEVELS</h1>
        <button class="btn" onclick="start(1)">1. RED FOREST</button>
        <button class="btn" onclick="start(2)" style="background:#00f;">2. BLUE ICE</button>
        <button class="btn" onclick="start(3)" style="background:#0f0;">3. GREEN JUNGLE</button>
        <button class="btn" onclick="goHome()" style="background:#444;">BACK</button>
    </div>

    <div id="gameOver">
        <h1 style="color:#f00;">WASTED</h1>
        <button class="btn" id="retryBtn">RETRY</button>
        <button class="btn" onclick="goHome()" style="background:#222; border:1px solid #f00;">HOME</button>
    </div>

    <div id="ui">SCORE: <span id="s">0</span></div>
    <canvas id="gameStage"></canvas>
    <button id="jumpBtn" ontouchstart="jmp(event)" onmousedown="jmp(event)">JUMP</button>

    <script>
        const cvs=document.getElementById('gameStage'), ctx=cvs.getContext('2d'), m=document.getElementById('menu'), g=document.getElementById('gameOver'), lm=document.getElementById('lvlMenu'), jb=document.getElementById('jumpBtn'), u=document.getElementById('ui');
        cvs.width=window.innerWidth; cvs.height=320;
        let p, obs, sc, spd, run=false, clr='#f00', smoke=[], curLvl=1;

        function showLvls() { m.style.display='none'; lm.style.display='flex'; }
        function goHome() { location.reload(); }

        function start(lNum){
            curLvl = lNum; run=true; 
            m.style.display='none'; lm.style.display='none'; g.style.display='none'; 
            cvs.style.display='block'; jb.style.display='block'; u.style.display='block';
            
            if(curLvl==1) clr='#f00';
            if(curLvl==2) clr='#00f';
            if(curLvl==3) clr='#0f0';

            document.documentElement.style.setProperty('--p', clr);
            p={x:60, y:220, w:45, h:45, dy:0, g:0.8, jump:15, onG:false, angle:0};
            obs=[]; sc=0; spd=8; smoke=[]; 
            document.getElementById('s').innerText=0;
            document.getElementById('retryBtn').onclick = () => start(curLvl);
            loop();
        }

        function jmp(e){ if(e) e.preventDefault(); if(p.onG){ p.dy=-p.jump; p.onG=false; } }

        function loop(){
            if(!run) return;
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            // Smoke Effect
            smoke.push({x: p.x + 5, y: p.y + p.h - 5, life: 1.0});
            for(let i=smoke.length-1; i>=0; i--){
                smoke[i].x -= spd/2; smoke[i].life -= 0.05;
                if(smoke[i].life <= 0) { smoke.splice(i,1); continue; }
                ctx.fillStyle = clr; ctx.globalAlpha = smoke[i].life * 0.4;
                ctx.beginPath(); ctx.arc(smoke[i].x, smoke[i].y, 10, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            // Player Physics
            p.dy+=p.g; p.y+=p.dy;
            if(p.y+p.h>=320){ p.y=320-p.h; p.dy=0; p.onG=true; p.angle=0; }
            if(!p.onG) p.angle += 10;

            // Player Draw
            ctx.save(); ctx.translate(p.x + p.w/2, p.y + p.h/2); ctx.rotate(p.angle * Math.PI / 180);
            ctx.fillStyle='#000'; ctx.shadowBlur=15; ctx.shadowColor=clr; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
            ctx.shadowBlur=0; ctx.fillStyle=clr; ctx.beginPath(); ctx.arc(-10, -8, 6, 0, Math.PI*2); ctx.arc(10, -8, 6, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            // Obstacles
            if(Math.random()<0.02 && (obs.length==0 || obs[obs.length-1].x < cvs.width-300)){
                obs.push({x:cvs.width, y:320, w:35, h:50});
            }
            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd;
                ctx.fillStyle='#fff'; ctx.beginPath(); ctx.moveTo(obs[i].x, 320); ctx.lineTo(obs[i].x+17, 320-obs[i].h); ctx.lineTo(obs[i].x+35, 320); ctx.fill();
                
                if(p.x < obs[i].x+28 && p.x+p.w > obs[i].x+7 && p.y+p.h > 320-obs[i].h) over();
                if(obs[i].x < -100){ obs.splice(i,1); sc++; document.getElementById('s').innerText=sc; }
            }
            requestAnimationFrame(loop);
        }

        function over(){ run=false; cvs.style.display='none'; jb.style.display='none'; u.style.display='none'; g.style.display='flex'; }
    </script>
</body>
</html>
