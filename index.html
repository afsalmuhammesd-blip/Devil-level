<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - FULL RESPONSIVE</title>
    <style>
        :root { --p: #f00; --bg: radial-gradient(circle, #300, #000); }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: var(--p); }
        
        /* കാൻവാസ് ഹൈറ്റ് ഫോൺ സ്ക്രീനിന്റെ പകുതിയാക്കി കുറച്ചു */
        canvas { background: var(--bg); border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 320px; box-sizing: border-box; }
        
        #menu, #gameOver { text-align: center; position: absolute; z-index: 10; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); height: 100vh; top: 0; }
        #gameOver { display: none; }
        h1 { font-size: 40px; color: var(--p); text-shadow: 0 0 10px var(--p); margin: 0; }
        .btn { background: var(--p); color: #fff; border: none; padding: 12px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; margin-top: 15px; min-width: 180px; box-shadow: 0 0 10px var(--p); cursor: pointer; }
        
        #jumpBtn { position: fixed; bottom: 30px; right: 30px; width: 85px; height: 85px; background: rgba(255,0,0,0.1); border: 3px solid var(--p); border-radius: 50%; color: var(--p); display: none; z-index: 100; font-weight: bold; font-size: 16px; outline: none; }
        #ui { position: fixed; top: 20px; left: 20px; color: var(--p); font-size: 20px; font-weight: bold; display: none; }
        
        .modBox { margin-top: 10px; border: 2px solid var(--p); padding: 10px; border-radius: 12px; background: #111; width: 180px; display: none; }
        .modOpt { background: transparent; color: #fff; border: 1px solid #fff; padding: 8px; width: 100%; margin-bottom: 5px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>DEVIL DASH</h1>
        <button class="btn" onclick="startGame()">START GAME</button>
        <button class="btn" style="font-size:15px; padding:8px;" onclick="toggleM('sMod')">MODS</button>
        <div id="sMod" class="modBox">
            <button class="modOpt" style="color:#f00; border-color:#f00;" onclick="upMod('#f00','#300')">RED</button>
            <button class="modOpt" style="color:#00f; border-color:#00f;" onclick="upMod('#00f','#003')">BLUE</button>
            <button class="modOpt" style="color:#0f0; border-color:#0f0;" onclick="upMod('#0f0','#030')">GREEN</button>
            <button class="modOpt" style="color:#f0f; border-color:#f0f;" onclick="upMod('#f0f','#303')">VIOLET</button>
        </div>
    </div>

    <div id="gameOver">
        <h1>WASTED</h1>
        <p id="fS" style="font-size:22px; color:white; margin:10px 0;">SCORE: 0</p>
        <button class="btn" onclick="startGame()">RESTART</button>
        <button class="btn" style="font-size:15px; padding:8px;" onclick="toggleM('gMod')">MODS</button>
        <div id="gMod" class="modBox">
            <button class="modOpt" style="color:#f00; border-color:#f00;" onclick="upMod('#f00','#300')">RED</button>
            <button class="modOpt" style="color:#00f; border-color:#00f;" onclick="upMod('#00f','#003')">BLUE</button>
            <button class="modOpt" style="color:#0f0; border-color:#0f0;" onclick="upMod('#0f0','#030')">GREEN</button>
            <button class="modOpt" style="color:#f0f; border-color:#f0f;" onclick="upMod('#f0f','#303')">VIOLET</button>
        </div>
    </div>

    <div id="ui">SCORE: <span id="s">0</span></div>
    <canvas id="game"></canvas>
    <button id="jumpBtn" onmousedown="jump()" ontouchstart="jump(event)">JUMP</button>

    <script>
        const cvs=document.getElementById('game'), ctx=cvs.getContext('2d'), mnu=document.getElementById('menu'), gov=document.getElementById('gameOver'), jmp=document.getElementById('jumpBtn'), scr=document.getElementById('ui'), root=document.documentElement;
        cvs.width=window.innerWidth; cvs.height=320;
        
        let p, obs, bats, sc, spd, act=false, lS=0, clr='#f00';

        function startGame(){
            act=true; mnu.style.display='none'; gov.style.display='none'; cvs.style.display='block'; jmp.style.display='block'; scr.style.display='block';
            p={x:50, y:200, w:35, h:35, dy:0, j:13, g:0.7, gr:false}; 
            obs=[]; bats=[]; sc=0; spd=6; lS=Date.now();
            document.getElementById('s').innerText=0; 
            requestAnimationFrame(gameLoop);
        }

        function jump(e){ if(e) e.preventDefault(); if(p.gr){ p.dy=-p.j; p.gr=false; } }

        function gameLoop(){
            if(!act) return; 
            ctx.clearRect(0,0,cvs.width,cvs.height);
            spd = 6 + Math.floor(sc / 20);
            if(spd > 13) spd = 13; 

            p.dy+=p.g; p.y+=p.dy; 
            if(p.y+p.h >= 320){ p.y=320-p.h; p.dy=0; p.gr=true; }

            ctx.shadowBlur=15; ctx.shadowColor=clr; ctx.fillStyle='#111'; 
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle=clr; ctx.beginPath(); ctx.arc(p.x+8,p.y+12,3,0,Math.PI*2); ctx.arc(p.x+27,p.y+12,3,0,Math.PI*2); ctx.fill();

            let n=Date.now();
            if(n-lS > (1800 - (spd*45)) && Math.random()<0.07){
                let isDouble = Math.random() > 0.8; 
                obs.push({x:cvs.width, y:285, w:30, h:35, dbl: isDouble});
                lS=n;
            }

            if(sc >= 20 && Math.random() < 0.02 && bats.length < 2){
                bats.push({x:cvs.width, y: 150 + Math.random()*30, w:55, h:35});
            }

            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd; 
                ctx.shadowBlur=0; ctx.fillStyle='#fff';
                ctx.beginPath(); ctx.moveTo(obs[i].x, 320); ctx.lineTo(obs[i].x+15, 320-obs[i].h); ctx.lineTo(obs[i].x+30, 320); ctx.fill();
                if(obs[i].dbl){
                    ctx.beginPath(); ctx.moveTo(obs[i].x+30, 320); ctx.lineTo(obs[i].x+45, 320-obs[i].h); ctx.lineTo(obs[i].x+60, 320); ctx.fill();
                }
                let hitW = obs[i].dbl ? 60 : 30;
                if(p.x < obs[i].x+hitW && p.x+p.w > obs[i].x && p.y+p.h > 320-obs[i].h) end();
                if(obs[i].x < -100){ obs.splice(i,1); sc++; document.getElementById('s').innerText=sc; }
            }

            for(let i=bats.length-1; i>=0; i--){
                bats[i].x -= (spd + 1.5);
                ctx.fillStyle = clr; ctx.shadowBlur=10; ctx.shadowColor=clr;
                ctx.beginPath(); ctx.moveTo(bats[i].x, bats[i].y + 15); ctx.lineTo(bats[i].x + 25, bats[i].y); ctx.lineTo(bats[i].x + 55, bats[i].y + 15); ctx.lineTo(bats[i].x + 25, bats[i].y + 35); ctx.fill();
                if(p.x < bats[i].x+bats[i].w && p.x+p.w > bats[i].x && p.y < bats[i].y+bats[i].h && p.y+p.h > bats[i].y) end();
                if(bats[i].x < -100) bats.splice(i,1);
            }
            requestAnimationFrame(gameLoop);
        }

        function end(){ 
            act=false; cvs.style.display='none'; jmp.style.display='none'; scr.style.display='none'; 
            gov.style.display='flex'; document.getElementById('fS').innerText='SCORE: '+sc; 
            document.getElementById('gMod').style.display='none';
        }
        function toggleM(id){ let el=document.getElementById(id); el.style.display=(el.style.display==='block')?'none':'block'; }
        function upMod(c, b){ clr=c; root.style.setProperty('--p',c); root.style.setProperty('--bg',`radial-gradient(circle, ${b}, #000)`); }
    </script>
</body>
</html>
