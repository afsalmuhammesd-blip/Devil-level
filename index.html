<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH PRO - AFZAL</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 320px; position: relative; }
        #splash, #menu, #gameOver { text-align: center; position: absolute; z-index: 100; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; height: 100vh; top: 0; }
        #menu, #gameOver { display: none; }
        h1 { font-size: 45px; color: var(--p); text-shadow: 0 0 15px var(--p); margin: 0; font-weight: 900; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 12px; margin-top: 15px; min-width: 200px; cursor: pointer; }
        #jumpBtn { position: fixed; bottom: 30px; right: 25px; width: 80px; height: 80px; background: rgba(255,0,0,0.2); border: 3px solid var(--p); border-radius: 50%; color: #fff; display: none; z-index: 1000; font-weight: bold; outline: none; -webkit-tap-highlight-color: transparent; }
        #stats { position: fixed; top: 25px; left: 20px; color: var(--p); font-size: 20px; font-weight: bold; display: none; text-align: left; }
        #igFooter { position: absolute; bottom: 20px; color: #666; font-size: 14px; text-decoration: none; }
        
        /* Loading Animation */
        #loader { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--p); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash">
        <h1>DEVIL DASH</h1>
        <p style="color: #666; margin-top: 10px;">PRO EDITION</p>
        <div id="loader"></div>
    </div>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <p style="color: #666;">HIGH SCORE: <span id="hsMenu">0</span></p>
        <button class="btn" onclick="start()">START GAME</button>
        <a href="https://instagram.com/afzal_07" id="igFooter">FOLLOW @afzal_07</a>
    </div>

    <div id="gameOver">
        <h1 style="color:#f00;">WASTED</h1>
        <p id="finalScore" style="color:#fff; font-size: 20px; margin: 15px 0;"></p>
        <button class="btn" onclick="start()">RETRY</button>
        <button class="btn" style="background:#222;" onclick="location.reload()">HOME</button>
    </div>

    <div id="stats">
        SCORE: <span id="s">0</span><br>
        BEST: <span id="hs">0</span>
    </div>
    <canvas id="gameStage"></canvas>
    <button id="jumpBtn" ontouchstart="jmp(event)" onmousedown="jmp(event)">JUMP</button>

    <audio id="dieSound" src="https://www.myinstants.com/media/sounds/meme-de-creditos-finales.mp3"></audio>

    <script>
        const cvs=document.getElementById('gameStage'), ctx=cvs.getContext('2d'), sl=document.getElementById('splash'), m=document.getElementById('menu'), g=document.getElementById('gameOver'), jb=document.getElementById('jumpBtn'), st=document.getElementById('stats');
        cvs.width=window.innerWidth; cvs.height=320;
        
        let p, obs, sc, spd, run=false, hiScore = localStorage.getItem('devilHS') || 0, smoke = [];
        document.getElementById('hsMenu').innerText = hiScore;

        // 3 സെക്കൻഡ് ലോഡിംഗ് കഴിഞ്ഞ് മെനു കാണിക്കും
        setTimeout(() => { sl.style.display='none'; m.style.display='flex'; }, 3000);

        function start(){
            run=true; m.style.display='none'; g.style.display='none'; cvs.style.display='block'; jb.style.display='block'; st.style.display='block';
            p={x:60, y:220, w:45, h:45, dy:0, g:0.8, jump:15, onG:false, angle:0};
            obs=[]; sc=0; spd=8; smoke=[];
            document.getElementById('hs').innerText = hiScore;
            loop();
        }

        function jmp(e){ if(e) e.preventDefault(); if(p.onG){ p.dy=-p.jump; p.onG=false; } }

        function loop(){
            if(!run) return;
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            // Smoke Effect (പുതിയ ഫീച്ചർ)
            smoke.push({x: p.x, y: p.y + p.h - 5, life: 1.0});
            for(let i=smoke.length-1; i>=0; i--){
                smoke[i].x -= spd/2; smoke[i].life -= 0.05;
                if(smoke[i].life <= 0) { smoke.splice(i,1); continue; }
                ctx.fillStyle = '#f00'; ctx.globalAlpha = smoke[i].life * 0.4;
                ctx.beginPath(); ctx.arc(smoke[i].x, smoke[i].y, 10, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0; // Reset alpha

            // Player Physics
            p.dy+=p.g; p.y+=p.dy;
            if(p.y+p.h>=320){ p.y=320-p.h; p.dy=0; p.onG=true; p.angle=0; } // നിലത്തുനിൽക്കുമ്പോൾ ആംഗിൾ 0 ആകും
            if(!p.onG) p.angle += 10; // ചാടുമ്പോൾ റൊട്ടേറ്റ് ചെയ്യും

            // Player Draw with 360 Rotation (പുതിയ ഫീച്ചർ)
            ctx.save();
            ctx.translate(p.x + p.w/2, p.y + p.h/2); // കാർ നടുവിലേക്ക് ക്യാമറ മാറ്റുന്നു
            ctx.rotate(p.angle * Math.PI / 180); // റൊട്ടേറ്റ് ചെയ്യുന്നു
            
            ctx.fillStyle='#000'; ctx.shadowBlur=15; ctx.shadowColor='#f00';
            ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); // നടുവിൽ നിന്ന് വരയ്ക്കുന്നു
            ctx.shadowBlur=0; ctx.fillStyle='#f00'; 
            ctx.beginPath(); ctx.arc(-10, -8, 6, 0, Math.PI*2); ctx.arc(10, -8, 6, 0, Math.PI*2); ctx.fill(); // Eyes
            
            ctx.restore();

            // Obstacles
            if(Math.random()<0.02 && (obs.length==0 || obs[obs.length-1].x < cvs.width-300)){
                obs.push({x:cvs.width, y:320, w:35, h:50});
            }
            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd;
                ctx.fillStyle='#fff'; ctx.beginPath(); ctx.moveTo(obs[i].x, 320); ctx.lineTo(obs[i].x+17, 320-obs[i].h); ctx.lineTo(obs[i].x+35, 320); ctx.fill();
                
                // Collision check (ശരീരം മുഴുവൻ കണക്കാക്കാൻ)
                if(p.x < obs[i].x+28 && p.x+p.w > obs[i].x+7 && p.y+p.h > 320-obs[i].h) over();
                if(obs[i].x < -50){ obs.splice(i,1); sc++; spd+=0.05; document.getElementById('s').innerText=sc; }
            }
            requestAnimationFrame(loop);
        }

        function over(){
            run=false; 
            document.getElementById('dieSound').play(); 
            if(sc > hiScore) { hiScore = sc; localStorage.setItem('devilHS', hiScore); }
            g.style.display='flex'; st.style.display='none'; jb.style.display='none';
            document.getElementById('finalScore').innerText = "SCORE: " + sc + " | BEST: " + hiScore;
        }
    </script>
</body>
</html>
