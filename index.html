<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - FINAL REPAIR</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: radial-gradient(circle, #300, #000); border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 300px; }
        #menu, #gameOver { text-align: center; position: absolute; z-index: 100; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; height: 100vh; top: 0; }
        #gameOver { display: none; background: rgba(0,0,0,0.9); }
        h1 { font-size: 40px; color: var(--p); text-shadow: 0 0 10px var(--p); margin: 0 0 20px 0; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; margin-top: 15px; min-width: 200px; box-shadow: 0 0 10px var(--p); cursor: pointer; }
        #jumpBtn { position: fixed; bottom: 30px; right: 30px; width: 80px; height: 80px; background: rgba(255,0,0,0.2); border: 3px solid var(--p); border-radius: 50%; color: var(--p); display: none; z-index: 1000; font-weight: bold; }
        #ui { position: fixed; top: 20px; left: 20px; color: var(--p); font-size: 20px; font-weight: bold; display: none; }
        .modBox { margin-top: 10px; border: 1px solid var(--p); padding: 10px; border-radius: 10px; display: none; width: 200px; }
        .modOpt { background: #222; color: #fff; border: 1px solid #444; padding: 8px; width: 100%; margin-bottom: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <button class="btn" onclick="start()">START GAME</button>
        <button class="btn" style="font-size:14px; min-width:120px;" onclick="tgl('mMod')">MODS</button>
        <div id="mMod" class="modBox">
            <button class="modOpt" onclick="set('#f00','#300')">RED</button>
            <button class="modOpt" onclick="set('#00f','#003')">BLUE</button>
            <button class="modOpt" onclick="set('#0f0','#030')">GREEN</button>
        </div>
    </div>

    <div id="gameOver">
        <h1>WASTED</h1>
        <p id="fS" style="color:#fff; font-size:20px;">SCORE: 0</p>
        <button class="btn" onclick="start()">RESTART</button>
        <button class="btn" style="font-size:14px; min-width:120px;" onclick="tgl('gMod')">MODS</button>
        <div id="gMod" class="modBox">
            <button class="modOpt" onclick="set('#f00','#300')">RED</button>
            <button class="modOpt" onclick="set('#00f','#003')">BLUE</button>
            <button class="modOpt" onclick="set('#0f0','#030')">GREEN</button>
        </div>
    </div>

    <div id="ui">SCORE: <span id="s">0</span></div>
    <canvas id="game"></canvas>
    <button id="jumpBtn" ontouchstart="jmp()" onmousedown="jmp()">JUMP</button>

    <script>
        const cvs=document.getElementById('game'), ctx=cvs.getContext('2d'), m=document.getElementById('menu'), g=document.getElementById('gameOver'), jb=document.getElementById('jumpBtn'), u=document.getElementById('ui');
        cvs.width=window.innerWidth; cvs.height=300;
        let p, obs, sc, spd, run=false, clr='#f00';

        function start(){
            run=true; m.style.display='none'; g.style.display='none'; cvs.style.display='block'; jb.style.display='block'; u.style.display='block';
            p={x:50, y:200, w:35, h:35, dy:0, g:0.7, jump:12, onG:false};
            obs=[]; sc=0; spd=6; document.getElementById('s').innerText=0;
            loop();
        }

        function jmp(){ if(p.onG){ p.dy=-p.jump; p.onG=false; } }

        function loop(){
            if(!run) return;
            ctx.clearRect(0,0,cvs.width,cvs.height);
            p.dy+=p.g; p.y+=p.dy;
            if(p.y+p.h>=300){ p.y=300-p.h; p.dy=0; p.onG=true; }
            ctx.fillStyle=clr; ctx.fillRect(p.x, p.y, p.w, p.h);

            if(Math.random()<0.02 && (obs.length==0 || obs[obs.length-1].x < cvs.width-250)){
                obs.push({x:cvs.width, y:265, w:30, h:35});
            }

            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd;
                ctx.fillStyle='#fff'; ctx.fillRect(obs[i].x, obs[i].y, obs[i].w, obs[i].h);
                if(p.x < obs[i].x+obs[i].w && p.x+p.w > obs[i].x && p.y+p.h > obs[i].y) over();
                if(obs[i].x < -50){ obs.splice(i,1); sc++; document.getElementById('s').innerText=sc; spd+=0.1; }
            }
            requestAnimationFrame(loop);
        }

        function over(){ run=false; cvs.style.display='none'; jb.style.display='none'; u.style.display='none'; g.style.display='flex'; document.getElementById('fS').innerText='SCORE: '+sc; }
        function tgl(id){ let e=document.getElementById(id); e.style.display=(e.style.display=='block')?'none':'block'; }
        function set(c, b){ clr=c; document.documentElement.style.setProperty('--p', c); cvs.style.background=`radial-gradient(circle, ${b}, #000)`; }
    </script>
</body>
</html>
