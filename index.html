    <title>DEVIL DASH - MODS FIXED FINAL</title>
    <style>
        :root { --p: #f00; --bg: radial-gradient(circle, #300, #000); }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: var(--p); }
        canvas { background: var(--bg); border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 300px; }
        
        /* Menu & GameOver fixed center */
        #menu, #gameOver { 
            text-align: center; 
            position: absolute; 
            z-index: 20; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0,0,0,0.85);
            height: 100vh;
            top: 0;
        }
        #gameOver { display: none; }
        
        h1 { font-size: 40px; color: var(--p); text-shadow: 0 0 15px var(--p); margin: 0; }
        .btn { background: var(--p); color: #fff; border: none; padding: 12px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; margin-top: 15px; min-width: 180px; box-shadow: 0 0 10px var(--p); cursor: pointer; }
        
        #jumpBtn { position: fixed; bottom: 30px; right: 30px; width: 85px; height: 85px; background: rgba(255,0,0,0.1); border: 3px solid var(--p); border-radius: 50%; color: var(--p); display: none; z-index: 100; font-weight: bold; outline: none; }
        #ui { position: fixed; top: 20px; left: 20px; color: var(--p); font-size: 20px; font-weight: bold; display: none; }
        
        .modBox { margin-top: 10px; border: 2px solid var(--p); padding: 10px; border-radius: 12px; background: #111; width: 180px; display: none; }
        .modOpt { background: transparent; color: #fff; border: 1px solid #fff; padding: 8px; width: 100%; margin-bottom: 5px; border-radius: 5px; font-size: 13px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
