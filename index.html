<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - HARD TASK</title>
    <style>
        :root { --p: #f00; --bg: radial-gradient(circle, #300, #000); }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; color: var(--p); }
        canvas { background: var(--bg); border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 400px; }
        #menu, #gameOver { text-align: center; position: absolute; z-index: 10; width: 100%; display: flex; flex-direction: column; align-items: center; }
        #gameOver { display: none; }
        h1 { font-size: 45px; color: var(--p); text-shadow: 0 0 10px var(--p); margin: 0; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px 35px; font-size: 20px; font-weight: bold; border-radius: 10px; margin-top: 15px; min-width: 200px; box-shadow: 0 0 10px var(--p); cursor: pointer; }
        #jumpBtn { position: absolute; bottom: 20px; right: 20px; width: 85px; height: 85px; background: rgba(0,0,0,0.5); border: 3px solid var(--p); border-radius: 50%; color: var(--p); display: none; z-index: 100; font-weight: bold; outline: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: var(--p); font-size: 18px; font-weight: bold; display: none; }
        .modBox { margin-top: 15px; border: 2px solid var(--p); padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.9); width: 220px; display: none; }
        .modOpt { background: transparent; color: #fff; border: 1px solid #fff; padding: 8px; width: 100%; margin-bottom: 5px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>DEVIL DASH</h1>
        <button class="btn" onclick="startGame()">START GAME</button>
        <button class="btn" style="font-size:16px; padding:10px;" onclick="toggleM('sMod')">MODS</button>
        <div id="sMod" class="modBox">
            <button class="modOpt" style="color:#f00; border-color:#f00;" onclick="upMod('#f00','#300')">RED</button>
            <button class="modOpt" style="color:#00f; border-color:#00f;" onclick="upMod('#00f','#003')">BLUE</button>
            <button class="modOpt" style="color:#0f0; border-color:#0f0;" onclick="upMod('#0f0','#030')">GREEN</button>
            <button class="modOpt" style="color:#f0f; border-color:#f0f;" onclick="upMod('#f0f','#303')">VIOLET</button>
        </div>
    </div>

    <div id="gameOver">
        <h1>WASTED</h1>
        <p id="fS" style="font-size:24px; color:white; margin:10px 0;">SCORE: 0</p>
        <button class="btn" onclick="startGame()">RESTART</button>
        <button class="btn" style="font-size:16px; padding:10px;" onclick="toggleM('eMod')">MODS</button>
        <div id="eMod" class="modBox">
            <button class="modOpt" style="color:#f00; border-color:#f00;" onclick="upMod('#f00','#300')">RED</button>
            <button class="modOpt" style="color:#00f; border-color:#00f;" onclick="upMod('#00f','#003')">BLUE</button>
            <button class="modOpt" style="color:#0f0; border-color:#0f0;" onclick="upMod('#0f0','#030')">GREEN</button>
            <button class="modOpt" style="color:#f0f; border-color:#f0f;" onclick="upMod('#f0f','#303')">VIOLET</button>
        </div>
    </div>

    <div id="ui">SCORE: <span id="s">0</span></div>
    <canvas id="game"></canvas>
    <button id="jumpBtn" onmousedown="jump()" ontouchstart="jump()">JUMP</button>

    <script>
        const cvs=document.getElementById('game'), ctx=cvs.getContext('2d'), mnu=document.getElementById('menu'), gov=document.getElementById('gameOver'), jmp=document.getElementById('jumpBtn'), scr=document.getElementById('ui'), root=document.documentElement;
        cvs.width=window.innerWidth; cvs.height=400;
        
        let p, obs, bats, sc, spd, act=false, lS=0, clr='#f00';

        function startGame(){
            act=true; mnu.style.display='none'; gov.style.display='none'; cvs.style.display='block'; jmp.style.display='block'; scr.style.display='block';
            p={x:80, y:300, w:40, h:40, dy:0, j:14, g:0.8, gr:false}; 
            obs=[]; bats=[]; sc=0; spd=6.5; lS=Date.now();
            document.getElementById('s').innerText=0; 
            requestAnimationFrame(gameLoop);
        }

        function jump(){ if(p.gr){ p.dy=-p.j; p.gr=false; } }

        function gameLoop(){
            if(!act) return; 
            ctx.clearRect(0,0,cvs.width,cvs.height);

            // സ്കോർ 20 കഴിഞ്ഞാൽ സ്പീഡ് കൂടും
            if(sc >= 20 && spd < 14) spd += 0.005;

            p.dy+=p.g; p.y+=p.dy; 
            if(p.y+p.h>=400){ p.y=400-p.h; p.dy=0; p.gr=true; }

            // PLAYER DRAWING
            ctx.shadowBlur=15; ctx.shadowColor=clr; ctx.fillStyle='#111'; 
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle=clr; ctx.beginPath(); ctx.arc(p.x+10,p.y+15,3,0,Math.PI*2); ctx.arc(p.x+30,p.y+15,3,0,Math.PI*2); ctx.fill();

            // SPAWN OBSTACLES (TRIANGLES)
            let n=Date.now();
            if(n-lS > (1600 - (spd*20)) && Math.random()<0.06){
                let isDouble = Math.random() > 0.7; // 30% chance
                obs.push({x:cvs.width, y:365, w:30, h:35, dbl: isDouble});
                lS=n;
            }

            // SPAWN BATS (VAVVAL) - Score 20 കഴിഞ്ഞാൽ മാത്രം
            if(sc >= 20 && Math.random() < 0.015 && bats.length < 2){
                bats.push({x:cvs.width, y: 160 + Math.random()*80, w:30, h:20});
            }

            // DRAW TRIANGLES (അടുത്തടുത്ത് നിൽക്കുന്ന രീതിയിൽ)
            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd; 
                ctx.shadowBlur=0; ctx.fillStyle='#fff';
                
                // First Spike
                ctx.beginPath(); ctx.moveTo(obs[i].x, 400); ctx.lineTo(obs[i].x+15, 400-obs[i].h); ctx.lineTo(obs[i].x+30, 400); ctx.fill();
                
                // Second Spike (Gap വളരെ കുറച്ചു - ചേർന്ന് നിൽക്കും)
                if(obs[i].dbl){
                    ctx.beginPath(); ctx.moveTo(obs[i].x+28, 400); ctx.lineTo(obs[i].x+43, 400-obs[i].h); ctx.lineTo(obs[i].x+58, 400); ctx.fill();
                }

                // Collision Check
                let hitWidth = obs[i].dbl ? 58 : 30;
                if(p.x < obs[i].x+hitWidth && p.x+p.w > obs[i].x && p.y+p.h > 400-obs[i].h) end();
                
                if(obs[i].x < -100){ obs.splice(i,1); sc++; document.getElementById('s').innerText=sc; }
            }

            // DRAW BATS
            for(let i=bats.length-1; i>=0; i--){
                bats[i].x -= (spd + 2);
                ctx.fillStyle = clr;
                ctx.beginPath();
                ctx.moveTo(bats[i].x, bats[i].y);
                ctx.lineTo(bats[i].x+15, bats[i].y+15);
                ctx.lineTo(bats[i].x+30, bats[i].y);
                ctx.fill();
                if(p.x < bats[i].x+30 && p.x+p.w > bats[i].x && p.y < bats[i].y+20 && p.y+p.h > bats[i].y) end();
                if(bats[i].x < -50) bats.splice(i,1);
            }
            requestAnimationFrame(gameLoop);
        }

        function end(){ act=false; cvs.style.display='none'; jmp.style.display='none'; scr.style.display='none'; gov.style.display='flex'; document.getElementById('fS').innerText='SCORE: '+sc; }
        function toggleM(id){ let el=document.getElementById(id); el.style.display=(el.style.display==='block')?'none':'block'; }
        function upMod(c, b){ clr=c; root.style.setProperty('--p',c); root.style.setProperty('--bg',`radial-gradient(circle, ${b}, #000)`); }
    </script>
</body>
</html>
