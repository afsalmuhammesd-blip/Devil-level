<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH PRO</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 320px; }
        #splash, #menu, #gameOver { text-align: center; position: absolute; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; height: 100vh; top: 0; z-index: 100; }
        #menu, #gameOver { display: none; }
        h1 { font-size: 45px; color: var(--p); text-shadow: 0 0 15px var(--p); margin: 0; font-weight: 900; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 12px; margin-top: 15px; min-width: 200px; }
        #jumpBtn { position: fixed; bottom: 30px; right: 25px; width: 80px; height: 80px; background: rgba(255,0,0,0.2); border: 3px solid var(--p); border-radius: 50%; color: #fff; display: none; z-index: 1000; outline: none; }
        #stats { position: fixed; top: 25px; left: 20px; color: var(--p); font-size: 20px; font-weight: bold; display: none; }
        #igFooter { position: absolute; bottom: 20px; color: #444; font-size: 12px; text-decoration: none; }
        #loader { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--p); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash"><h1>DEVIL DASH</h1><div id="loader"></div></div>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <p style="color: #666;">HIGH SCORE: <span id="hsMenu">0</span></p>
        <button class="btn" onclick="start()">START GAME</button>
        <a href="https://instagram.com/afzal_07" id="igFooter">BY @afzal_07</a>
    </div>

    <div id="gameOver">
        <h1 style="color:#f00;">WASTED</h1>
        <p id="finalScore" style="color:#fff;"></p>
        <button class="btn" onclick="restartGame()">RETRY</button>
        <button class="btn" style="background:#222;" onclick="location.reload()">HOME</button>
    </div>

    <div id="stats">SCORE: <span id="s">0</span></div>
    <canvas id="gameStage"></canvas>
    <button id="jumpBtn" ontouchstart="jmp(event)" onmousedown="jmp(event)">JUMP</button>

    <audio id="jsnd" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="dsnd" src="https://www.myinstants.com/media/sounds/meme-de-creditos-finales.mp3"></audio>

    <script>
        const cvs=document.getElementById('gameStage'), ctx=cvs.getContext('2d'), sl=document.getElementById('splash'), m=document.getElementById('menu'), g=document.getElementById('gameOver'), jb=document.getElementById('jumpBtn'), st=document.getElementById('stats');
        const js=document.getElementById('jsnd'), ds=document.getElementById('dsnd');
        cvs.width=window.innerWidth; cvs.height=320;
        
        let p, obs, sc, spd, run=false, hiScore = localStorage.getItem('devilHS') || 0, smoke = [];
        document.getElementById('hsMenu').innerText = hiScore;

        setTimeout(() => { sl.style.display='none'; m.style.display='flex'; }, 2500);

        function start(){
            run=true; m.style.display='none'; g.style.display='none'; cvs.style.display='block'; jb.style.display='block'; st.style.display='block';
            p={x:60, y:220, w:45, h:45, dy:0, g:0.8, jump:15, onG:false, angle:0};
            obs=[]; sc=0; spd=8; smoke=[];
            loop();
        }

        function restartGame(){ ds.pause(); ds.currentTime = 0; start(); }

        function jmp(e){ if(e) e.preventDefault(); if(p.onG){ p.dy=-p.jump; p.onG=false; js.currentTime=0; js.play(); } }

        function loop(){
            if(!run) return;
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            // Reduced smoke for zero lag
            if(sc % 2 === 0) smoke.push({x: p.x, y: p.y + p.h - 5, life: 1.0});
            for(let i=smoke.length-1; i>=0; i--){
                smoke[i].x -= spd/2; smoke[i].life -= 0.1;
                if(smoke[i].life <= 0) { smoke.splice(i,1); continue; }
                ctx.fillStyle = '#f00'; ctx.globalAlpha = smoke[i].life * 0.3;
                ctx.beginPath(); ctx.arc(smoke[i].x, smoke[i].y, 8, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            p.dy+=p.g; p.y+=p.dy;
            if(p.y+p.h>=320){ p.y=320-p.h; p.dy=0; p.onG=true; p.angle=0; }
            if(!p.onG) p.angle += 10;

            ctx.save(); ctx.translate(p.x + p.w/2, p.y + p.h/2); ctx.rotate(p.angle * Math.PI / 180);
            ctx.fillStyle='#000'; ctx.shadowBlur=15; ctx.shadowColor='#f00';
            ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
            ctx.shadowBlur=0; ctx.fillStyle='#f00'; ctx.beginPath(); ctx.arc(-10,-8,6,0,Math.PI*2); ctx.arc(10,-8,6,0,Math.PI*2); ctx.fill();
            ctx.restore();

            // FIXED OBSTACLE LOGIC: Multiple triangles appearing close together
            if(Math.random() < 0.03 && (obs.length === 0 || obs[obs.length-1].x < cvs.width - 250)){
                let count = (Math.random() < 0.4) ? 2 : 1; // 40% chance for 2 triangles
                if(spd > 11 && Math.random() < 0.3) count = 3; // 30% chance for 3 triangles at high speed
                
                let gap = 38; // Constant gap between triangles in a group
                for(let j=0; j<count; j++){
                    obs.push({x: cvs.width + (j * gap), y: 320, w: 35, h: 50});
                }
            }

            for(let i=obs.length-1; i>=0; i--){
                obs[i].x -= spd;
                ctx.fillStyle='#fff'; ctx.beginPath(); ctx.moveTo(obs[i].x, 320); ctx.lineTo(obs[i].x+17, 320-obs[i].h); ctx.lineTo(obs[i].x+35, 320); ctx.fill();
                
                // Collision Detection
                if(p.x < obs[i].x+28 && p.x+p.w > obs[i].x+7 && p.y+p.h > 320-obs[i].h) over();
                
                if(obs[i].x < -50){ 
                    obs.splice(i,1); 
                    sc++; 
                    spd += 0.04; 
                    document.getElementById('s').innerText = sc; 
                }
            }
            requestAnimationFrame(loop);
        }

        function over(){
            run = false; ds.play(); 
            if(sc > hiScore) { hiScore = sc; localStorage.setItem('devilHS', hiScore); }
            g.style.display='flex'; st.style.display='none'; jb.style.display='none';
            document.getElementById('finalScore').innerText = "SCORE: " + sc + " | BEST: " + hiScore;
        }
    </script>
</body>
</html>
