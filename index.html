<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - BLIZZARD TASK</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 320px; position: relative; z-index: 5; }
        #menu, #gameOver, #lvlMenu { text-align: center; position: absolute; z-index: 100; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; height: 100vh; top: 0; }
        #gameOver, #lvlMenu { display: none; }
        h1 { font-size: 45px; color: var(--p); text-shadow: 0 0 15px var(--p); margin: 0 0 20px 0; font-weight: 900; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 12px; margin-top: 15px; min-width: 220px; box-shadow: 0 0 15px var(--p); cursor: pointer; }
        .home-btn { background: #222; border: 1px solid var(--p); }
        #jumpBtn { position: fixed; bottom: 30px; right: 25px; width: 75px; height: 75px; background: rgba(0,0,0,0.5); border: 3px solid var(--p); border-radius: 50%; color: var(--p); display: none; z-index: 1000; font-weight: bold; font-size: 14px; box-shadow: 0 0 15px var(--p); outline: none; -webkit-tap-highlight-color: transparent; }
        #ui { position: fixed; top: 25px; left: 20px; color: var(--p); font-size: 20px; font-weight: bold; display: none; z-index: 10; }
        .lvl-btn { background: #111; color: #fff; border: 1px solid #444; padding: 12px; width: 250px; border-radius: 10px; font-weight: bold; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <button class="btn" onclick="start(1)">START</button>
        <button class="btn" style="background:#222; border:1px solid var(--p);" onclick="showLvls()">LEVELS</button>
    </div>

    <div id="lvlMenu">
        <h1>LEVEL SELECT</h1>
        <button class="lvl-btn" style="border-color:#f00;" onclick="start(1)">1. FOREST (RED)</button>
        <button class="lvl-btn" style="border-color:#00f;" onclick="start(2)">2. BLIZZARD (BLUE)</button>
        <button class="lvl-btn" style="border-color:#0f0;" onclick="start(3)">3. JUNGLE (GREEN)</button>
        <button class="lvl-btn" style="border-color:#ff0;" onclick="start(4)">4. FIRE (YELLOW)</button>
        <button class="lvl-btn" style="border-color:#a0f;" onclick="start(5)">5. SPACE (VIOLET)</button>
        <button class="btn home-btn" onclick="goHome()">BACK</button>
    </div>

    <div id="gameOver">
        <h1>WASTED</h1>
        <button class="btn" id="retryBtn">RETRY</button>
        <button class="btn home-btn" onclick="goHome()">HOME</button>
    </div>

    <div id="ui">SCORE: <span id="s">0</span></div>
    <canvas id="gameStage"></canvas>
    <button id="jumpBtn" ontouchstart="jmp(event)" onmousedown="jmp(event)">JUMP</button>

    <script>
        const cvs=document.getElementById('gameStage'), ctx=cvs.getContext('2d'), m=document.getElementById('menu'), g=document.getElementById('gameOver'), lm=document.getElementById('lvlMenu'), jb=document.getElementById('jumpBtn'), u=document.getElementById('ui');
        cvs.width=window.innerWidth; cvs.height=320;
        let p, obs, sc, spd, run=false, clr='#f00', smoke=[], curLvl=1;

        function showLvls() { m.style.display='none'; lm.style.display='flex'; }
        function goHome() { location.reload(); }

        function start(lNum){
            curLvl = lNum; run=true; m.style.display='none'; lm.style.display='none'; g.style.display='none'; cvs.style.display='block'; jb.style.display='block'; u.style.display='block';
            
            if(curLvl==1) clr='#f00';
            if(curLvl==2) clr='#00f';
            if(curLvl==3) clr='#0f0';
            if(curLvl==4) clr='#ff0';
            if(curLvl==5) clr='#a0f';

            document.documentElement.style.setProperty('--p', clr);
            p={x:60, y:220, w:45, h:45, dy:0, g:curLvl==5?0.4:0.8, jump:curLvl==5?12:15, onG:false, angle:0};
            obs=[]; sc=0; spd=curLvl==2?11:7.5; // Blue level-ൽ സ്പീഡ് കൂട്ടി
            smoke=[]; 
            document.getElementById('s').innerText=0;
            document.getElementById('retryBtn').onclick = () => start(curLvl);
            loop();
        }

        function jmp(e){ if(e) e.preventDefault(); if(p.onG){ p.dy=-p.jump; p.onG=false; } }

        function drawObstacle(x, y, w, h, type) {
            ctx.shadowBlur = 10; ctx.shadowColor = clr;
            if(type == 2) { // ICE CRYSTAL SPIKE
                ctx.fillStyle = '#adf';
                ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+w/4, y-h/2); ctx.lineTo(x+w/2, y-h); ctx.lineTo(x+3*w/4, y-h/2); ctx.lineTo(x+w, y); ctx.fill();
            } else if(type == 3) { // TREE LOG
                ctx.fillStyle = '#420'; ctx.fillRect(x+w/3, y-h, w/3, h);
                ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.arc(x+w/2, y-h, 15, 0, Math.PI*2); ctx.fill();
            } else if(type == 4) { // FIRE BALL
                ctx.fillStyle = '#f90'; ctx.beginPath(); ctx.arc(x+w/2, y-h/2, 20, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.arc(x+w/2, y-h/2, 10, 0, Math.PI*2); ctx.fill();
            } else if(type == 5) { // SPACE ROCK
                ctx.fillStyle = '#555'; ctx.beginPath(); ctx.moveTo(x,y-10); ctx.lineTo(x+10, y-h); ctx.lineTo(x+w, y-20); ctx.lineTo(x+w-10, y); ctx.closePath(); ctx.fill();
            } else { // DEFAULT SPIKE
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+w/2, y-h); ctx.lineTo(x+w, y); ctx.fill();
            }
            ctx.shadowBlur = 0;
        }

        function loop(){
            if(!run) return;
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            // Blue Level Blizzard Effect (Snow Particles)
            if(curLvl == 2) {
                ctx.fillStyle = '#fff';
                for(let i=0; i<5; i++) {
                    ctx.beginPath(); ctx.arc(Math.random()*cvs.width, Math.random()*cvs.height, 1.5, 0, Math.PI*2); ctx.fill();
                }
            }

            // Smoke
            smoke.push({x: p.x + 5, y: p.y + p.h - 5, life:
