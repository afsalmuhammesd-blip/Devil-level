<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - BUTTONS FIXED</title>
    <style>
        :root { --p: #f00; --bg: radial-gradient(circle, #300, #000); }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: var(--p); }
        
        canvas { background: var(--bg); border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 300px; }
        
        #menu, #gameOver { 
            text-align: center; position: absolute; z-index: 1000; width: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; height: 100vh; top: 0; left: 0;
        }
        #gameOver { display: none; background: rgba(0,0,0,0.95); }
        
        h1 { font-size: 45px; color: var(--p); text-shadow: 0 0 15px var(--p); margin-bottom: 25px; }
        .btn { 
            background: var(--p); color: #fff; border: none; padding: 18px 40px; 
            font-size: 22px; font-weight: bold; border-radius: 12px; margin-top: 15px; 
            min-width: 220px; box-shadow: 0 0 20px var(--p); cursor: pointer; 
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        
        #jumpBtn { 
            position: fixed; bottom: 30px; right: 30px; width: 95px; height: 95px; 
            background: rgba(255,0,0,0.2); border: 4px solid var(--p); border-radius: 50%; 
            color: var(--p); display: none; z-index: 2000; font-weight: bold; outline: none;
        }
        #ui { position: fixed; top: 25px; left: 25px; color: var(--p); font-size: 24px; font-weight: bold; display: none; z-index: 10; }
        
        .modBox { margin-top: 15px; border: 2px solid var(--p); padding: 15px; border-radius: 15px; background: #111; width: 220px; display: none; }
        .modOpt { background: transparent; color: #fff; border: 1px solid #fff; padding: 12px; width: 100%; margin-bottom: 10px; border-radius: 8px; font-size: 15px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <button id="sBtn" class="btn">START GAME</button>
        <button id="mBtn" class="btn" style="font-size:16px; padding:10px; min-width:150px;">MODS</button>
        <div id="sMod" class="modBox">
            <button class="modOpt" style="color:#f00;" onclick="upMod('#f00','#300')">RED</button>
            <button class="modOpt" style="color:#00f;" onclick="upMod('#00f','#003')">BLUE</button>
            <button class="modOpt" style="color:#0f0;" onclick="upMod('#0f0','#030')">GREEN</button>
        </div>
    </div>

    <div id="gameOver">
        <h1>WASTED</h1>
        <p id="fS" style="font-size:26px; color:white; margin:15px 0;">SCORE: 0</p>
        <button id="rBtn" class="btn">RESTART</button>
        <button id="gmBtn" class="btn" style="font-size:16px; padding:10px; min-width:150px;">MODS</button>
        <div id="gMod" class="modBox">
            <button class="modOpt" style="color:#f00;" onclick="upMod('#f00','#300')">RED</button>
            <button class="modOpt" style="color:#00f;" onclick="upMod('#00f','#003')">BLUE</button>
            <button class="modOpt" style="color:#0f0;" onclick="upMod('#0f0','#030')">GREEN</button>
        </div>
    </div>

    <div id="ui">SCORE: <span id="s">0</span></div>
    <canvas id="game"></canvas>
    <button id="jumpBtn">JUMP</button>

    <script>
        const cvs=document.getElementById('game'), ctx=cvs.getContext('2d'), mnu=document.getElementById('menu'), gov=document.getElementById('gameOver'), jmp=document.getElementById('jumpBtn'), scr=document.getElementById('ui'), root=document.documentElement;
        
        cvs.width=window.innerWidth; cvs.height=300;
        let p, obs, bats, sc, spd, act=false, lS=0, clr='#f00', gameReq;

        // BUTTON CLICK EVENTS - ഇത് മാറ്റം വരുത്തിയിട്ടുണ്ട്
        document.getElementById('sBtn').addEventListener('click', startGame);
        document.getElementById('rBtn').addEventListener('click', startGame);
        document.getElementById('mBtn').addEventListener('click', () => toggleM('sMod'));
        document.getElementById('gmBtn').addEventListener('click', () => toggleM('gMod'));
        jmp.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        jmp.addEventListener('mousedown', jump);

        function startGame(){
            cancelAnimationFrame(gameReq);
            act=true; mnu.style.display='none'; gov.style.display='none'; cvs.style.display='block'; jmp.style.display='block'; scr.style.display='block';
            p={x:50, y:200, w:40, h:40, dy:0, j:14, g:0.8, gr:false}; 
            obs=[]; bats=[]; sc=0; spd=6; lS=Date.now();
            document.getElementById('s').innerText=0; 
            gameLoop();
        }

        function jump(){ if(p.gr){ p.dy=-p.j; p.gr=false; } }

        function gameLoop(){
            if(!act) return; 
            ctx.clearRect(0,0,cvs.width,cvs.height);
            spd = 6 + Math.floor(sc / 15);
            if(spd > 14) spd = 14; 
            p.dy+=p.g; p.y+=p.dy; 
            if(p.y+p.h >= 300){ p.y=300-p.h; p.dy=0; p.gr=true; }
            ctx.shadowBlur=15; ctx.shadowColor=clr; ctx.fillStyle='#111'; 
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle=clr; ctx.beginPath(); ctx.arc(p.x+10,p.y+15,3,0,Math.PI*2); ctx.arc(p.x+30,p.y+15,3,0,Math.PI*2); ctx.fill();
            let n=Date.now();
            if(n-lS > (1800 - (spd*50)) && Math.random()<0.08){
                obs.push({x:cvs.width, y:265, w:30, h:35});
                lS=n;
            }
            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd; 
                ctx.shadowBlur=0; ctx.fillStyle='#fff';
                ctx.beginPath(); ctx.moveTo(obs[i].x, 300); ctx.lineTo(obs[i].x+15, 300-obs[i].h); ctx.lineTo(obs[i].x+30, 300); ctx.fill();
                if(p.x < obs[i].x+30 && p.x+p.w > obs[i].x && p.y+p.h > 300-obs[i].h) end();
                if(obs[i].x < -100){ obs.splice(i,1); sc++; document.getElementById('s').innerText=sc; }
            }
            gameReq = requestAnimationFrame(gameLoop);
        }

        function end(){ 
            act=false; cancelAnimationFrame(gameReq);
            cvs.style.display='none'; jmp.style.display='none'; scr.style.display='none'; 
            gov.style.display='flex'; document.getElementById('fS').innerText='SCORE: '+sc; 
        }
        function toggleM(id){ let el=document.getElementById(id); el.style.display=(el.style.display==='block')?'none':'block'; }
        function upMod(c, b){ clr=c; root.style.setProperty('--p',c); root.style.setProperty('--bg',`radial-gradient(circle, ${b}, #000)`); }
    </script>
</body>
</html>
