<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH PRO</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 320px; }
        #menu, #gameOver, #ui { text-align: center; position: absolute; z-index: 100; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; height: 100vh; top: 0; }
        #gameOver { display: none; background: rgba(0,0,0,0.9); }
        h1 { font-size: 40px; color: var(--p); text-shadow: 0 0 15px var(--p); margin: 0; }
        .btn { background: var(--p); color: #fff; border: none; padding: 12px 25px; font-size: 18px; font-weight: bold; border-radius: 8px; margin-top: 15px; min-width: 180px; }
        #jumpBtn { position: fixed; bottom: 30px; right: 25px; width: 80px; height: 80px; background: rgba(255,0,0,0.2); border: 3px solid var(--p); border-radius: 50%; color: #fff; display: none; z-index: 1000; }
        #stats { position: fixed; top: 20px; left: 20px; color: var(--p); font-weight: bold; display: none; text-align: left; }
        .ig-btn { background: #E1306C; margin-top: 20px; text-decoration: none; color: white; padding: 10px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <p style="color: #666;">HIGH SCORE: <span id="hsMenu">0</span></p>
        <button class="btn" onclick="start()">START GAME</button>
        <a href="https://instagram.com/xfzal_07" class="ig-btn">FOLLOW @xfzal_07</a>
    </div>

    <div id="gameOver">
        <h1 style="color:#f00;">WASTED</h1>
        <p id="finalScore" style="color:#fff;"></p>
        <button class="btn" onclick="start()">RETRY</button>
        <button class="btn" style="background:#222;" onclick="location.reload()">HOME</button>
    </div>

    <div id="stats">
        SCORE: <span id="s">0</span><br>
        BEST: <span id="hs">0</span>
    </div>
    <canvas id="gameStage"></canvas>
    <button id="jumpBtn" ontouchstart="jmp(event)">JUMP</button>

    <audio id="dieSound" src="https://www.myinstants.com/media/sounds/meme-de-creditos-finales.mp3"></audio>

    <script>
        const cvs=document.getElementById('gameStage'), ctx=cvs.getContext('2d'), m=document.getElementById('menu'), g=document.getElementById('gameOver'), jb=document.getElementById('jumpBtn'), st=document.getElementById('stats');
        cvs.width=window.innerWidth; cvs.height=320;
        
        let p, obs, sc, spd, run=false, hiScore = localStorage.getItem('devilHS') || 0;
        document.getElementById('hsMenu').innerText = hiScore;

        function start(){
            run=true; m.style.display='none'; g.style.display='none'; cvs.style.display='block'; jb.style.display='block'; st.style.display='block';
            p={x:60, y:220, w:45, h:45, dy:0, g:0.8, jump:15, onG:false};
            obs=[]; sc=0; spd=8;
            document.getElementById('hs').innerText = hiScore;
            loop();
        }

        function jmp(e){ if(e) e.preventDefault(); if(p.onG){ p.dy=-p.jump; p.onG=false; } }

        function loop(){
            if(!run) return;
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            p.dy+=p.g; p.y+=p.dy;
            if(p.y+p.h>=320){ p.y=320-p.h; p.dy=0; p.onG=true; }

            // Player Draw
            ctx.fillStyle='#000'; ctx.shadowBlur=15; ctx.shadowColor='#f00';
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.shadowBlur=0; ctx.fillStyle='#f00'; 
            ctx.fillRect(p.x+10, p.y+10, 8, 8); ctx.fillRect(p.x+27, p.y+10, 8, 8); // Eyes

            // Obstacles
            if(Math.random()<0.02 && (obs.length==0 || obs[obs.length-1].x < cvs.width-300)){
                obs.push({x:cvs.width, y:320, w:35, h:50});
            }
            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd;
                ctx.fillStyle='#fff'; ctx.beginPath(); ctx.moveTo(obs[i].x, 320); ctx.lineTo(obs[i].x+17, 320-obs[i].h); ctx.lineTo(obs[i].x+35, 320); ctx.fill();
                
                if(p.x < obs[i].x+25 && p.x+p.w > obs[i].x+10 && p.y+p.h > 320-obs[i].h) over();
                if(obs[i].x < -50){ obs.splice(i,1); sc++; spd+=0.1; document.getElementById('s').innerText=sc; }
            }
            requestAnimationFrame(loop);
        }

        function over(){
            run=false; 
            document.getElementById('dieSound').play(); // തോൽക്കുമ്പോൾ സൗണ്ട് വരാൻ
            if(sc > hiScore) {
                hiScore = sc;
                localStorage.setItem('devilHS', hiScore);
            }
            g.style.display='flex'; st.style.display='none'; jb.style.display='none';
            document.getElementById('finalScore').innerText = "SCORE: " + sc + " | BEST: " + hiScore;
        }
    </script>
</body>
</html>
