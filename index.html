<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - MODS & DOUBLE SPIKES</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        
        /* DEVIL FACE BACKGROUND */
        canvas { 
            background: radial-gradient(circle at 30% 40%, #400 5%, transparent 15%), 
                        radial-gradient(circle at 70% 40%, #400 5%, transparent 15%),
                        radial-gradient(circle at 50% 80%, #200 20%, #000 50%);
            border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 320px; 
            box-shadow: inset 0 0 100px #000;
        }
        
        #menu, #gameOver { text-align: center; position: absolute; z-index: 100; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; height: 100vh; top: 0; }
        #gameOver { display: none; background: rgba(0,0,0,0.9); }
        
        h1 { font-size: 40px; color: var(--p); text-shadow: 0 0 10px var(--p); margin: 0 0 20px 0; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; margin-top: 15px; min-width: 200px; box-shadow: 0 0 10px var(--p); cursor: pointer; }
        
        /* JUMP BUTTON - SMALL & SIDE */
        #jumpBtn { 
            position: fixed; bottom: 30px; right: 20px; width: 65px; height: 65px; 
            background: rgba(255,0,0,0.1); border: 2px solid var(--p); border-radius: 50%; 
            color: var(--p); display: none; z-index: 1000; font-weight: bold; font-size: 12px;
            outline: none; box-shadow: 0 0 10px var(--p); -webkit-tap-highlight-color: transparent;
        }
        
        #ui { position: fixed; top: 25px; left: 20px; color: var(--p); font-size: 22px; font-weight: bold; display: none; z-index: 10; }
        
        /* OLD MOD BUTTON STYLE */
        .modBox { margin-top: 10px; border: 1px solid var(--p); padding: 10px; border-radius: 10px; display: none; width: 200px; background: #111; }
        .modOpt { background: #222; color: #fff; border: 1px solid #444; padding: 10px; width: 100%; margin-bottom: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <button class="btn" onclick="start()">START GAME</button>
        <button class="btn" style="font-size:14px; min-width:120px;" onclick="tgl('mMod')">MODS</button>
        <div id="mMod" class="modBox">
            <button class="modOpt" style="color:#f00;" onclick="set('#f00','#400')">RED MODE</button>
            <button class="modOpt" style="color:#00f;" onclick="set('#00f','#004')">BLUE MODE</button>
            <button class="modOpt" style="color:#0f0;" onclick="set('#0f0','#040')">GREEN MODE</button>
        </div>
    </div>

    <div id="gameOver">
        <h1>WASTED</h1>
        <p id="fS" style="color:#fff; font-size:24px;">SCORE: 0</p>
        <button class="btn" onclick="start()">RESTART</button>
        <button class="btn" style="font-size:14px; min-width:120px;" onclick="tgl('gMod')">MODS</button>
        <div id="gMod" class="modBox">
            <button class="modOpt" style="color:#f00;" onclick="set('#f00','#400')">RED MODE</button>
            <button class="modOpt" style="color:#00f;" onclick="set('#00f','#004')">BLUE MODE</button>
            <button class="modOpt" style="color:#0f0;" onclick="set('#0f0','#040')">GREEN MODE</button>
        </div>
    </div>

    <div id="ui">SCORE: <span id="s">0</span></div>
    <canvas id="game"></canvas>
    <button id="jumpBtn" ontouchstart="jmp(event)" onmousedown="jmp(event)">JUMP</button>

    <script>
        const cvs=document.getElementById('game'), ctx=cvs.getContext('2d'), m=document.getElementById('menu'), g=document.getElementById('gameOver'), jb=document.getElementById('jumpBtn'), u=document.getElementById('ui');
        cvs.width=window.innerWidth; cvs.height=320;
        let p, obs, sc, spd, run=false, clr='#f00';

        function start(){
            run=true; m.style.display='none'; g.style.display='none'; cvs.style.display='block'; jb.style.display='block'; u.style.display='block';
            p={x:60, y:220, w:42, h:42, dy:0, g:0.85, jump:15, onG:false};
            obs=[]; sc=0; spd=7.5; document.getElementById('s').innerText=0;
            loop();
        }

        function jmp(e){ if(e) e.preventDefault(); if(p.onG){ p.dy=-p.jump; p.onG=false; } }

        function loop(){
            if(!run) return;
            ctx.clearRect(0,0,cvs.width,cvs.height);
            p.dy+=p.g; p.y+=p.dy;
            if(p.y+p.h>=320){ p.y=320-p.h; p.dy=0; p.onG=true; }
            
            // Player
            ctx.fillStyle='#000'; ctx.shadowBlur=15; ctx.shadowColor=clr;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle=clr; ctx.beginPath(); ctx.arc(p.x+12, p.y+15, 5, 0, Math.PI*2); ctx.arc(p.x+30, p.y+15, 5, 0, Math.PI*2); ctx.fill();

            // DOUBLE SPIKE LOGIC
            if(Math.random()<0.02 && (obs.length==0 || obs[obs.length-1].x < cvs.width-300)){
                let isDouble = Math.random() > 0.7; // 30% ചാൻസ് ഡബിൾ സ്പൈക്ക് വരാൻ
                obs.push({x:cvs.width, y:320, w:35, h:45, type: isDouble ? 'double' : 'single'});
            }

            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd;
                ctx.fillStyle='#fff'; ctx.shadowBlur=0;
                
                // ത്രികോണം വരയ്ക്കുന്നു
                ctx.beginPath();
                ctx.moveTo(obs[i].x, 320);
                ctx.lineTo(obs[i].x+17, 320-obs[i].h);
                ctx.lineTo(obs[i].x+35, 320);
                ctx.fill();
                
                // ഡബിൾ ആണെങ്കിൽ ഒരെണ്ണം കൂടി
                if(obs[i].type === 'double'){
                    ctx.beginPath();
                    ctx.moveTo(obs[i].x+40, 320);
                    ctx.lineTo(obs[i].x+57, 320-obs[i].h);
                    ctx.lineTo(obs[i].x+75, 320);
                    ctx.fill();
                    // Collision for second spike
                    if(p.x < obs[i].x+70 && p.x+p.w > obs[i].x+45 && p.y+p.h > 320-obs[i].h) over();
                }

                if(p.x < obs[i].x+28 && p.x+p.w > obs[i].x+7 && p.y+p.h > 320-obs[i].h) over();
                if(obs[i].x < -100){ obs.splice(i,1); sc++; document.getElementById('s').innerText=sc; spd+=0.1; }
            }
            requestAnimationFrame(loop);
        }

        function over(){ run=false; cvs.style.display='none'; jb.style.display='none'; u.style.display='none'; g.style.display='flex'; document.getElementById('fS').innerText='SCORE: '+sc; }
        function tgl(id){ let e=document.getElementById(id); e.style.display=(e.style.display=='block')?'none':'block'; }
        function set(c, b){ 
            clr=c; document.documentElement.style.setProperty('--p', c); 
            cvs.style.background = `radial-gradient(circle at 30% 40%, ${b} 5%, transparent 15%), radial-gradient(circle at 70% 40%, ${b} 5%, transparent 15%), radial-gradient(circle at 50% 80%, ${b} 20%, #000 50%)`;
        }
    </script>
</body>
</html>
