<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - LEVELS & HOME</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; border-bottom: 5px solid var(--p); display: none; width: 100vw; height: 320px; position: relative; z-index: 5; }
        #menu, #gameOver, #lvlMenu { text-align: center; position: absolute; z-index: 100; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; height: 100vh; top: 0; }
        #gameOver, #lvlMenu { display: none; }
        h1 { font-size: 45px; color: var(--p); text-shadow: 0 0 15px var(--p); margin: 0 0 20px 0; font-weight: 900; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 12px; margin-top: 15px; min-width: 200px; box-shadow: 0 0 15px var(--p); cursor: pointer; }
        .home-btn { background: #333; border: 1px solid var(--p); }
        #jumpBtn { position: fixed; bottom: 30px; right: 25px; width: 70px; height: 70px; background: rgba(255,0,0,0.3); border: 3px solid var(--p); border-radius: 50%; color: #fff; display: none; z-index: 1000; font-weight: bold; }
        #ui { position: fixed; top: 25px; left: 20px; color: var(--p); font-size: 20px; font-weight: bold; display: none; z-index: 10; }
        .lvl-btn { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 10px; width: 220px; margin: 5px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <button class="btn" onclick="start(1)">START GAME</button>
        <button class="btn" style="background:#222; border:1px solid var(--p);" onclick="showLvls()">LEVELS</button>
    </div>

    <div id="lvlMenu">
        <h1 style="font-size:30px;">SELECT LEVEL</h1>
        <button class="lvl-btn" style="border-color:#f00;" onclick="start(1)">LVL 1: DARK FOREST</button>
        <button class="lvl-btn" style="border-color:#00f;" onclick="start(2)">LVL 2: FROZEN HELL</button>
        <button class="lvl-btn" style="border-color:#0f0;" onclick="start(3)">LVL 3: TOXIC SWAMP</button>
        <button class="lvl-btn" style="border-color:#a0f;" onclick="start(4)">LVL 4: GRAVITY VOID</button>
        <button class="lvl-btn" style="border-color:#ff0;" onclick="start(5)">LVL 5: DEVIL MAZE</button>
        <button class="btn home-btn" onclick="goHome()">BACK</button>
    </div>

    <div id="gameOver">
        <h1 style="color:#fff;">WASTED</h1>
        <p id="fS" style="color:#fff; font-size:24px;">SCORE: 0</p>
        <button class="btn" id="retryBtn">RESTART</button>
        <button class="btn home-btn" onclick="goHome()">HOME</button>
    </div>

    <div id="ui">LVL: <span id="l">1</span> | SCORE: <span id="s">0</span></div>
    <canvas id="gameStage"></canvas>
    <button id="jumpBtn" ontouchstart="jmp(event)" onmousedown="jmp(event)">JUMP</button>

    <script>
        const cvs=document.getElementById('gameStage'), ctx=cvs.getContext('2d'), m=document.getElementById('menu'), g=document.getElementById('gameOver'), lm=document.getElementById('lvlMenu'), jb=document.getElementById('jumpBtn'), u=document.getElementById('ui');
        cvs.width=window.innerWidth; cvs.height=320;
        let p, obs, sc, spd, run=false, clr='#f00', smoke=[], curLvl=1, jmpCount=0;

        function showLvls() { m.style.display='none'; lm.style.display='flex'; }
        function goHome() { location.reload(); } // ലളിതമായ ഹോം ബട്ടൺ ലോജിക്

        function start(lNum){
            curLvl = lNum; run=true; m.style.display='none'; lm.style.display='none'; g.style.display='none'; cvs.style.display='block'; jb.style.display='block'; u.style.display='block';
            document.getElementById('l').innerText = curLvl;
            
            // Level Settings
            let grav = 0.8, jumpPower = 15;
            if(curLvl==1) clr='#f00';
            if(curLvl==2) { clr='#00f'; spd=6; }
            if(curLvl==3) clr='#0f0';
            if(curLvl==4) { clr='#a0f'; grav=0.4; jumpPower=12; }
            if(curLvl==5) { clr='#ff0'; spd=10; }

            p={x:60, y:220, w:45, h:45, dy:0, g:grav, jump:jumpPower, onG:false, angle:0};
            obs=[]; sc=0; spd = (curLvl==5) ? 10 : 7.5; smoke=[]; 
            document.getElementById('s').innerText=0;
            document.getElementById('retryBtn').onclick = () => start(curLvl);
            loop();
        }

        function jmp(e){ 
            if(e) e.preventDefault(); 
            if(p.onG){ 
                p.dy=-p.jump; p.onG=false; jmpCount=1;
            } else if(curLvl==3 && jmpCount<2) { // Level 3 Double Jump
                p.dy=-p.jump*0.8; jmpCount=2;
            }
        }

        function loop(){
            if(!run) return;
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            // Smoke
            smoke.push({x: p.x + 5, y: p.y + p.h - 5, life: 1.0});
            for(let i=smoke.length-1; i>=0; i--){
                smoke[i].x -= spd/2; smoke[i].life -= 0.04;
                if(smoke[i].life <= 0) { smoke.splice(i,1); continue; }
                ctx.fillStyle = clr; ctx.globalAlpha = smoke[i].life * 0.5;
                ctx.beginPath(); ctx.arc(smoke[i].x, smoke[i].y, 10, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            p.dy+=p.g; p.y+=p.dy;
            if(p.y+p.h>=320){ 
                p.y=320-p.h; p.dy=0; p.onG=true; p.angle=0; 
            }
            if(!p.onG) p.angle += 12;

            // Slippery logic for Level 2
            if(curLvl==2 && p.onG && sc > 0) p.x = 60 + Math.sin(sc)*5;

            ctx.save();
            ctx.translate(p.x + p.w/2, p.y + p.h/2);
            ctx.rotate(p.angle * Math.PI / 180);
            ctx.fillStyle='#000'; ctx.shadowBlur=15; ctx.shadowColor=clr;
            ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
            ctx.shadowBlur=0; ctx.fillStyle=clr; ctx.beginPath(); 
            ctx.arc(-p.w/2+14, -p.h/2+16, 6, 0, Math.PI*2); ctx.arc(-p.w/2+32, -p.h/2+16, 6, 0, Math.PI*2); 
            ctx.fill(); ctx.restore();

            if(Math.random()<0.02 && (obs.length==0 || obs[obs.length-1].x < cvs.width-320)){
                obs.push({x:cvs.width, y:320, w:35, h:50, dbl: Math.random() > 0.7});
            }
            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd; ctx.fillStyle='#fff';
                ctx.beginPath(); ctx.moveTo(obs[i].x, 320); ctx.lineTo(obs[i].x+17, 320-obs[i].h); ctx.lineTo(obs[i].x+35, 320); ctx.fill();
                if(p.x < obs[i].x+28 && p.x+p.w > obs[i].x+7 && p.y+p.h > 320-obs[i].h) over();
                if(obs[i].dbl){
                    ctx.beginPath(); ctx.moveTo(obs[i].x+45, 320); ctx.lineTo(obs[i].x+62, 320-obs[i].h); ctx.lineTo(obs[i].x+80, 320); ctx.fill();
                    if(p.x < obs[i].x+75 && p.x+p.w > obs[i].x+50 && p.y+p.h > 320-obs[i].h) over();
                }
                if(obs[i].x < -100){ obs.splice(i,1); sc++; document.getElementById('s').innerText=sc; spd+=0.05; }
            }
            requestAnimationFrame(loop);
        }

        function over(){ run=false; cvs.style.display='none'; jb.style.display='none'; u.style.display='none'; g.style.display='flex'; document.getElementById('fS').innerText='SCORE: '+sc; }
    </script>
</body>
</html>
