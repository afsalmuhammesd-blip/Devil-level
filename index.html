<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVIL DASH - PRO VERSION</title>
    <style>
        :root { --p: #f00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: radial-gradient(circle, #200, #000); border-bottom: 4px solid var(--p); display: none; width: 100vw; height: 300px; }
        
        #menu, #gameOver { 
            text-align: center; position: absolute; z-index: 999; width: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; height: 100vh; top: 0; left: 0;
        }
        #gameOver { display: none; background: rgba(0,0,0,0.9); }
        
        h1 { font-size: 50px; color: var(--p); text-shadow: 0 0 20px var(--p); margin: 0 0 20px 0; letter-spacing: 5px; }
        .btn { 
            background: var(--p); color: #fff; border: none; padding: 15px 40px; 
            font-size: 22px; font-weight: bold; border-radius: 50px; margin-top: 15px; 
            min-width: 220px; box-shadow: 0 0 20px var(--p); cursor: pointer;
            transition: 0.3s; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.95); }
        
        #jumpBtn { 
            position: fixed; bottom: 30px; right: 30px; width: 90px; height: 90px; 
            background: rgba(255,0,0,0.1); border: 4px solid var(--p); border-radius: 50%; 
            color: var(--p); display: none; z-index: 1000; font-weight: bold; font-size: 18px;
            box-shadow: 0 0 15px var(--p);
        }
        #ui { position: fixed; top: 25px; left: 25px; color: var(--p); font-size: 26px; font-weight: bold; display: none; text-shadow: 0 0 10px #000; }
        
        .modBox { margin-top: 20px; border: 2px solid var(--p); padding: 15px; border-radius: 15px; display: none; width: 220px; background: #111; }
        .modOpt { background: #222; color: #fff; border: 1px solid #444; padding: 12px; width: 100%; margin-bottom: 8px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>DEVIL DASH</h1>
        <button id="startBtn" class="btn">START GAME</button>
        <button id="modBtn" class="btn" style="font-size:16px; min-width:140px; background: transparent; border: 2px solid var(--p);">MODS</button>
        <div id="mMod" class="modBox">
            <button class="modOpt" id="redM" style="color:#f00;">RED MODE</button>
            <button class="modOpt" id="blueM" style="color:#00f;">BLUE MODE</button>
            <button class="modOpt" id="greenM" style="color:#0f0;">GREEN MODE</button>
        </div>
    </div>

    <div id="gameOver">
        <h1 style="color: #fff; text-shadow: 0 0 20px #f00;">WASTED</h1>
        <p id="fS" style="color:#fff; font-size:28px; margin: 10px 0;">SCORE: 0</p>
        <button id="restartBtn" class="btn">RESTART</button>
    </div>

    <div id="ui">SCORE: <span id="s">0</span></div>
    <canvas id="game"></canvas>
    <button id="jumpBtn">JUMP</button>

    <script>
        const cvs=document.getElementById('game'), ctx=cvs.getContext('2d'), 
              mnu=document.getElementById('menu'), gov=document.getElementById('gameOver'), 
              jb=document.getElementById('jumpBtn'), u=document.getElementById('ui');

        cvs.width=window.innerWidth; cvs.height=300;
        let p, obs, bats, sc, spd, act=false, clr='#f00', req;

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('modBtn').addEventListener('click', () => {
            let m = document.getElementById('mMod');
            m.style.display = (m.style.display == 'block') ? 'none' : 'block';
        });

        document.getElementById('redM').addEventListener('click', () => setC('#f00','#200'));
        document.getElementById('blueM').addEventListener('click', () => setC('#00f','#002'));
        document.getElementById('greenM').addEventListener('click', () => setC('#0f0','#020'));

        jb.addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); });
        jb.addEventListener('mousedown', doJump);

        function startGame(){
            act=true; mnu.style.display='none'; gov.style.display='none'; 
            cvs.style.display='block'; jb.style.display='block'; u.style.display='block';
            p={x:60, y:200, w:40, h:40, dy:0, g:0.8, jmp:15, onG:false};
            obs=[]; bats=[]; sc=0; spd=7;
            document.getElementById('s').innerText=0;
            loop();
        }

        function doJump(){ if(p.onG){ p.dy=-p.jmp; p.onG=false; } }

        function loop(){
            if(!act) return;
            ctx.clearRect(0,0,cvs.width,cvs.height);
            
            p.dy+=p.g; p.y+=p.dy;
            if(p.y+p.h>=300){ p.y=300-p.h; p.dy=0; p.onG=true; }
            
            // Player - Devil Style
            ctx.fillStyle='#111'; ctx.shadowBlur=15; ctx.shadowColor=clr;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle=clr; // Eyes
            ctx.beginPath(); ctx.arc(p.x+10, p.y+15, 4, 0, Math.PI*2); ctx.arc(p.x+30, p.y+15, 4, 0, Math.PI*2); ctx.fill();

            // Obstacles - Spikes
            if(Math.random()<0.02 && (obs.length==0 || obs[obs.length-1].x < cvs.width-280)){
                obs.push({x:cvs.width, y:300, w:30, h:45});
            }

            for(let i=obs.length-1; i>=0; i--){
                obs[i].x-=spd;
                ctx.shadowBlur=0; ctx.fillStyle='#fff';
                ctx.beginPath();
                ctx.moveTo(obs[i].x, 300);
                ctx.lineTo(obs[i].x+15, 300-obs[i].h);
                ctx.lineTo(obs[i].x+30, 300);
                ctx.fill();
                
                if(p.x < obs[i].x+25 && p.x+p.w > obs[i].x+5 && p.y+p.h > 300-obs[i].h) endGame();
                if(obs[i].x < -50){ obs.splice(i,1); sc++; document.getElementById('s').innerText=sc; spd+=0.1; }
            }

            // Bats (Birds)
            if(sc > 10 && Math.random() < 0.015 && bats.length < 2){
                bats.push({x:cvs.width, y:120 + Math.random()*50, w:50, h:30});
            }

            for(let i=bats.length-1; i>=0; i--){
                bats[i].x -= (spd + 2);
                ctx.fillStyle=clr; ctx.shadowBlur=10; ctx.shadowColor=clr;
                ctx.beginPath();
                ctx.moveTo(bats[i].x, bats[i].y+15);
                ctx.lineTo(bats[i].x+25, bats[i].y);
                ctx.lineTo(bats[i].x+50, bats[i].y+15);
                ctx.lineTo(bats[i].x+25, bats[i].y+30);
                ctx.fill();
                
                if(p.x < bats[i].x+bats[i].w && p.x+p.w > bats[i].x && p.y < bats[i].y+bats[i].h && p.y+p.h > bats[i].y) endGame();
                if(bats[i].x < -60) bats.splice(i,1);
            }

            req = requestAnimationFrame(loop);
        }

        function endGame(){
            act=false; cancelAnimationFrame(req);
            cvs.style.display='none'; jb.style.display='none'; u.style.display='none';
            gov.style.display='flex'; document.getElementById('fS').innerText='SCORE: '+sc;
        }

        function setC(c, b){
            clr=c; document.documentElement.style.setProperty('--p', c);
            cvs.style.background=`radial-gradient(circle, ${b}, #000)`;
        }
    </script>
</body>
</html>
